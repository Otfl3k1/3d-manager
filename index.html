<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a2e">
  <title>3D Print Manager</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Segoe UI", system-ui, sans-serif; background: #F7F8FA; }
    input[type=range] { -webkit-appearance: none; appearance: none; height: 6px; border-radius: 3px; background: #e0e0e0; outline: none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #e94560; cursor: pointer; }
    input, select, textarea { -webkit-appearance: none; appearance: none; }
    ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

const uid = () => Math.random().toString(36).slice(2, 9);
const fmt = (n) => Number(n || 0).toFixed(2);
const today = () => new Date().toISOString().slice(0, 10);

const STATUS_COLORS = {
  "Новый":    { bg:"#E8F4FD", text:"#1a6fa8" },
  "В работе": { bg:"#FFF3CD", text:"#856404" },
  "Готов":    { bg:"#D1F2EB", text:"#0e6655" },
  "Выдан":    { bg:"#F0F0F0", text:"#555" },
  "Отменён":  { bg:"#FDECEA", text:"#c0392b" },
};

const SEED_ORDERS = [
  { id:uid(), client:"Иван Петров",   phone:"+380671234567", item:"Брелок-лого",     grams:12,  printHours:0.5, price:80,  hasModel:false, modelHours:0, modelRate:100, status:"Выдан",    date:"2025-06-10", filament:"PLA",   note:"" },
  { id:uid(), client:"Кофейня Roast", phone:"+380501112233", item:"Подставка x10",    grams:140, printHours:4,   price:650, hasModel:false, modelHours:0, modelRate:100, status:"Готов",    date:"2025-06-15", filament:"PLA",  note:"Срочно!" },
  { id:uid(), client:"Алина Коваль",  phone:"+380931234000", item:"Підставка з лого", grams:35,  printHours:2,   price:220, hasModel:true,  modelHours:3, modelRate:100, status:"В работе", date:"2025-06-20", filament:"PETG",  note:"Лого компанії" },
  { id:uid(), client:"Михайло Лис",   phone:"+380669998877", item:"Брелок-авто",      grams:8,   printHours:0.3, price:60,  hasModel:true,  modelHours:1, modelRate:150, status:"Новый",    date:"2025-06-23", filament:"PLA", note:"" },
];
const SEED_FILAMENTS = [
  { id:uid(), name:"PLA",      color:"#aaa", stock:1000, cost:0.28 },
  { id:uid(), name:"PLA Silk", color:"#aaa", stock:1000, cost:0.35 },
  { id:uid(), name:"PETG",     color:"#aaa", stock:1000, cost:0.35 },
];
const SEED_POINTS = [
  { id:uid(), name:"Кофейня Roast", address:"вул. Дерибасівська, 12", instagram:"@roast_coffee", telegram:"", phone:"+380671234567",
    keychains:[{ id:uid(), name:"Брелок-собака", qty:5, price:120, sold:2, paid:false },{ id:uid(), name:"Брелок-кот", qty:3, price:120, sold:1, paid:false }],
    payments:[], pointOrders:[], note:"" },
];

async function loadData(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}
async function saveData(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
}

function calcOrder(o, filaments) {
  const fil = filaments.find(f => f.name === o.filament);
  const matCost   = Number(o.grams||0) * (fil ? fil.cost : 0);
  const elecCost  = Number(o.printHours||0) * 4.5;
  const modelCost = o.hasModel ? Number(o.modelHours||0) * Number(o.modelRate||0) : 0;
  const cost      = matCost + elecCost;
  const revenue   = Number(o.price||0) + modelCost;
  const profit    = revenue - cost;
  return { matCost, elecCost, modelCost, cost, revenue, profit };
}

// Функция для безопасного открытия накладной в Telegram Web App
function openInvoiceTelegram(order, previewData) {
  const htmlContent = `
    <!DOCTYPE html>
    <html>
    <head>
      <meta charset="utf-8">
      <title>Накладна #${order.id}</title>
      <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 30px; color: #333; background: #fff; }
        .invoice-box { max-width: 800px; margin: auto; border: 1px solid #eee; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); }
        .header { display: flex; justify-content: space-between; border-bottom: 2px solid #1a1a2e; padding-bottom: 20px; margin-bottom: 20px; }
        .title { font-size: 24px; font-weight: bold; color: #1a1a2e; }
        .details-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .details-table th { background: #f7f8fa; text-align: left; padding: 12px; font-weight: 600; }
        .details-table td { padding: 12px; border-bottom: 1px solid #eee; }
        .total { text-align: right; margin-top: 30px; font-size: 18px; font-weight: bold; color: #1a1a2e; }
        .footer { margin-top: 50px; text-align: center; font-size: 12px; color: #888; }
      </style>
    </head>
    <body>
      <div class="invoice-box">
        <div class="header">
          <div>
            <div class="title">3D Print Manager</div>
            <div>Дата: ${order.date}</div>
          </div>
          <div style="text-align: right;">
            <div style="font-weight: bold;">НАКЛАДНА #${order.id}</div>
            <div>Статус: ${order.status}</div>
          </div>
        </div>
        
        <div style="margin-bottom: 20px;">
          <strong>Клієнт:</strong> ${order.client}<br>
          ${order.phone ? `<strong>Телефон:</strong> ${order.phone}<br>` : ''}
        </div>

        <table class="details-table">
          <thead>
            <tr>
              <th>Опис виробу / Послуга</th>
              <th>Параметри</th>
              <th>Сума</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>${order.item}</td>
              <td>${order.grams}г / ${order.printHours}год (${order.filament})</td>
              <td>${fmt(order.price)} грн</td>
            </tr>
            ${order.hasModel ? `
            <tr>
              <td>📐 Розробка 3D-моделі</td>
              <td>${order.modelHours} год × ${order.modelRate} грн/год</td>
              <td>${fmt(previewData.modelCost)} грн</td>
            </tr>
            ` : ''}
          </tbody>
        </table>

        <div class="total">
          Загальна вартість: ${fmt(previewData.revenue)} грн
        </div>

        ${order.note ? `<div style="margin-top:20px; padding:10px; background:#fafafa; border-left:3px solid #e94560;"><strong>Примітка:</strong> ${order.note}</div>` : ''}

        <div class="footer">
          Дякуємо за замовлення! Створено автоматично в 3D Print Manager.
        </div>
      </div>
    </body>
    </html>
  `;

  const blob = new Blob([htmlContent], { type: 'text/html' });
  const dataUrl = URL.createObjectURL(blob);

  if (window.Telegram && window.Telegram.WebApp) {
    window.Telegram.WebApp.openLink(dataUrl);
  } else {
    const newWin = window.open();
    if (newWin) newWin.document.write(htmlContent);
    else alert("Браузер заблокував вікно. Дозвольте всплывающие окна.");
  }
}

function App() {
  const [tab, setTab]             = useState("orders");
  const [orders, setOrders]       = useState(SEED_ORDERS);
  const [filaments, setFilaments] = useState(SEED_FILAMENTS);
  const [points, setPoints]       = useState(SEED_POINTS);
  const [loaded, setLoaded]       = useState(false);
  const [prefill, setPrefill]     = useState(null);

  useEffect(() => {
    (async () => {
      const [o,f,p] = await Promise.all([
        loadData("3dp2_orders", SEED_ORDERS),
        loadData("3dp2_filaments", SEED_FILAMENTS),
        loadData("3dp3_points", SEED_POINTS),
      ]);
      setOrders(o); setFilaments(f); setPoints(p);
      setLoaded(true);
      if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
      }
    })();
  }, []);

  useEffect(() => { if(loaded) saveData("3dp2_orders",     orders);    }, [orders,    loaded]);
  useEffect(() => { if(loaded) saveData("3dp2_filaments", filaments);  }, [filaments, loaded]);
  useEffect(() => { if(loaded) saveData("3dp3_points",    points);     }, [points,    loaded]);

  if (!loaded) return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:"#F7F8FA" }}>
      <div style={{ textAlign:"center", color:"#555" }}><div style={{ fontSize:40 }}>🖨</div><div style={{ marginTop:12 }}>Загрузка...</div></div>
    </div>
  );

  const doneOrders   = orders.filter(o => o.status === "Выдан");
  const totalRevenue = doneOrders.reduce((s,o) => s + calcOrder(o,filaments).revenue, 0);
  const totalCost    = doneOrders.reduce((s,o) => s + calcOrder(o,filaments).cost, 0);
  const netProfit    = (totalRevenue - totalCost);

  const TABS = [
    { key:"orders",    label:"📦 Заказы" },
    { key:"filament",  label:"🎞 Філамент" },
  ];

  return (
    <div style={{ minHeight:"100vh", background:"#F7F8FA", color:"#1a1a2e" }}>
      <div style={{ background:"linear-gradient(135deg,#1a1a2e 0%,#16213e 60%,#0f3460 100%)", padding:"16px 24px", display:"flex", alignItems:"center", gap:12, flexWrap:"wrap" }}>
        <span style={{ fontSize:28 }}>🖨</span>
        <div>
          <div style={{ color:"#fff", fontWeight:700, fontSize:18 }}>3D Print Manager</div>
          <div style={{ color:"#a0aec0", fontSize:12 }}>Telegram WebApp Mode</div>
        </div>
        <div style={{ marginLeft:"auto", display:"flex", gap:6 }}>
          {TABS.map(t => (
            <button key={t.key} onClick={() => setTab(t.key)} style={{
              background: tab===t.key ? "#e94560" : "rgba(255,255,255,0.08)", color: "#fff",
              border:"none", borderRadius:8, padding:"6px 12px", cursor:"pointer", fontSize:13, fontWeight:600,
            }}>{t.label}</button>
          ))}
        </div>
      </div>
      <div style={{ padding:"24px 20px", maxWidth:1100, margin:"0 auto" }}>
        {tab==="orders" && <Orders orders={orders} setOrders={setOrders} filaments={filaments} calcOrder={calcOrder}/>}
        {tab==="filament" && <div style={{padding:20, background:"#fff", borderRadius:12}}>Вкладка филамента (активна)</div>}
      </div>
    </div>
  );
}

function Orders({ orders, setOrders, filaments, calcOrder }) {
  const [search, setSearch]       = useState("");
  const [filterStatus, setFilter] = useState("Все");
  const [showForm, setShowForm]   = useState(false);
  const [editing, setEditing]     = useState(null);
  const emptyForm = { client:"", phone:"", item:"", grams:"", printHours:"", price:"", hasModel:false, modelHours:"", modelRate:100, status:"Новый", date:today(), filament:filaments[0]?.name||"", note:"" };
  const [form, setForm] = useState(emptyForm);

  const filtered = orders.filter(o => {
    const q = search.toLowerCase();
    return (!q || o.client.toLowerCase().includes(q) || o.item.toLowerCase().includes(q) || o.phone.includes(q))
      && (filterStatus==="Все" || o.status===filterStatus);
  });

  const openNew  = () => { setEditing(null); setForm(emptyForm); setShowForm(true); };
  const openEdit = (o) => { setEditing(o.id); setForm({...o}); setShowForm(true); };
  const save = () => {
    if(!form.client||!form.item) return alert("Заполните клиента и изделие");
    if(editing) setOrders(prev=>prev.map(o=>o.id===editing?{...form,id:editing}:o));
    else        setOrders(prev=>[{...form,id:uid()},...prev]);
    setShowForm(false);
  };

  const preview = calcOrder(form, filaments);

  const styles = {
    input: { padding:"8px 12px", border:"1px solid #ccc", borderRadius:8, fontSize:14, outline:"none" },
    btn: { padding:"8px 16px", background:"#e94560", color:"#fff", border:"none", borderRadius:8, cursor:"pointer", fontWeight:600 },
    btnSec: { padding:"8px 16px", background:"#ddd", color:"#333", border:"none", borderRadius:8, cursor:"pointer" },
    modal: { position:"fixed", top:0, left:0, right:0, bottom:0, background:"rgba(0,0,0,0.5)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:1000, padding:10 },
    box: { background:"#fff", padding:20, borderRadius:12, maxWidth:500, width:"100%", maxHeight:"90vh", overflowY:"auto" }
  };

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", marginBottom:16 }}>
        <h2>📦 Закази</h2>
        <button onClick={openNew} style={styles.btn}>+ Новий заказ</button>
      </div>

      <div style={{ display:"flex", gap:10, marginBottom:16 }}>
        <input placeholder="🔍 Пошук..." value={search} onChange={e=>setSearch(e.target.value)} style={{...styles.input, flex:1}}/>
      </div>

      {showForm && (
        <div style={styles.modal}>
          <div style={styles.box}>
            <h3>{editing?"Редагувати":"Новий"} заказ</h3>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginTop:12 }}>
              <div style={{gridColumn:"1/-1"}}>
                <label>Клієнт *</label>
                <input style={{...styles.input, width:"100%"}} value={form.client} onChange={e=>setForm(f=>({...f,client:e.target.value}))}/>
              </div>
              <div style={{gridColumn:"1/-1"}}>
                <label>Виріб *</label>
                <input style={{...styles.input, width:"100%"}} value={form.item} onChange={e=>setForm(f=>({...f,item:e.target.value}))}/>
              </div>
              <div>
                <label>Ціна (грн)</label>
                <input type="number" style={{...styles.input, width:"100%"}} value={form.price} onChange={e=>setForm(f=>({...f,price:e.target.value}))}/>
              </div>
              <div>
                <label>Статус</label>
                <select style={{...styles.input, width:"100%"}} value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))}>
                  {Object.keys(STATUS_COLORS).map(s=><option key={s}>{s}</option>)}
                </select>
              </div>
            </div>

            <div style={{display:"flex", gap:10, marginTop:20}}>
              <button onClick={save} style={styles.btn}>💾 Зберегти</button>
              <button onClick={()=>openInvoiceTelegram(form, preview)} style={{...styles.btn, background:"#3498DB"}}>📄 Накладная</button>
              <button onClick={()=>setShowForm(false)} style={styles.btnSec}>Скасувати</button>
            </div>
          </div>
        </div>
      )}

      <div style={{ background:"#fff", borderRadius:12, overflow:"hidden" }}>
        <table style={{ width:"100%", borderCollapse:"collapse", textAlign:"left" }}>
          <thead>
            <tr style={{ background:"#eee" }}>
              <th style={{ padding:12 }}>Клієнт</th>
              <th style={{ padding:12 }}>Виріб</th>
              <th style={{ padding:12 }}>Сума</th>
              <th style={{ padding:12 }}>Дії</th>
            </tr>
          </thead>
          <tbody>
            {filtered.map(o => {
              const c = calcOrder(o, filaments);
              return (
                <tr key={o.id} style={{ borderBottom:"1px solid #eee" }}>
                  <td style={{ padding:12 }}>{o.client}</td>
                  <td style={{ padding:12 }}>{o.item}</td>
                  <td style={{ padding:12 }}>{fmt(c.revenue)} грн</td>
                  <td style={{ padding:12 }}>
                    <button onClick={()=>openEdit(o)} style={{ marginRight:8, background:"none", border:"none", cursor:"pointer" }}>✏️</button>
                    <button onClick={()=>openInvoiceTelegram(o, c)} style={{ background:"none", border:"none", cursor:"pointer", marginRight:8 }} title="Открыть накладную">📄</button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

const root = AzadDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
