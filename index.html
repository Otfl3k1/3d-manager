<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1a1a2e">
  <title>3D Print Manager</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Segoe UI", system-ui, sans-serif; background: #F7F8FA; }

    ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }

<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

const uid = () => Math.random().toString(36).slice(2, 9);
const fmt = (n) => Number(n || 0).toFixed(2);
const today = () => new Date().toISOString().slice(0, 10);

const STATUS_COLORS = {
  "Новый":    { bg:"#E8F4FD", text:"#1a6fa8" },
  "В работе": { bg:"#FFF3CD", text:"#856404" },
  "Готов":    { bg:"#D1F2EB", text:"#0e6655" },
  "Выдан":    { bg:"#F0F0F0", text:"#555" },
  "Отменён":  { bg:"#FDECEA", text:"#c0392b" },
};
const FILAMENT_COLORS = ["#E74C3C","#E67E22","#F1C40F","#2ECC71","#1ABC9C","#3498DB","#9B59B6","#ECF0F1","#2C3E50","#E91E63"];

const SEED_ORDERS = [
  { id:uid(), client:"Иван Петров",   phone:"+380671234567", item:"Брелок-лого",      grams:12,  printHours:0.5, price:80,  hasModel:false, modelHours:0, modelRate:100, status:"Выдан",    date:"2025-06-10", filament:"PLA",   note:"" },
  { id:uid(), client:"Кофейня Roast", phone:"+380501112233", item:"Подставка x10",    grams:140, printHours:4,   price:650, hasModel:false, modelHours:0, modelRate:100, status:"Готов",    date:"2025-06-15", filament:"PLA",  note:"Срочно!" },
  { id:uid(), client:"Алина Коваль",  phone:"+380931234000", item:"Підставка з лого", grams:35,  printHours:2,   price:220, hasModel:true,  modelHours:3, modelRate:100, status:"В работе", date:"2025-06-20", filament:"PETG",  note:"Лого компанії" },
  { id:uid(), client:"Михайло Лис",   phone:"+380669998877", item:"Брелок-авто",      grams:8,   printHours:0.3, price:60,  hasModel:true,  modelHours:1, modelRate:150, status:"Новый",    date:"2025-06-23", filament:"PLA", note:"" },
];
const SEED_FILAMENTS = [
  { id:uid(), name:"PLA",      color:"#aaa", stock:1000, cost:0.28 },
  { id:uid(), name:"PLA Silk", color:"#aaa", stock:1000, cost:0.35 },
  { id:uid(), name:"PETG",     color:"#aaa", stock:1000, cost:0.35 },
];
const SEED_POINTS = [
  { id:uid(), name:"Кофейня Roast", address:"вул. Дерибасівська, 12", instagram:"@roast_coffee", telegram:"", phone:"+380671234567",
    keychains:[{ id:uid(), name:"Брелок-собака", qty:5, price:120, sold:2, paid:false },{ id:uid(), name:"Брелок-кот", qty:3, price:120, sold:1, paid:false }],
    payments:[], pointOrders:[], note:"" },
  { id:uid(), name:"Кофейня Aroma", address:"пр. Шевченка, 45", instagram:"@aroma_odesa", telegram:"@aroma", phone:"",
    keychains:[{ id:uid(), name:"Брелок-авто", qty:8, price:100, sold:3, paid:false }],
    payments:[{ id:uid(), amount:300, date:"2025-06-01", note:"Перша виплата" }], pointOrders:[], note:"" },
  { id:uid(), name:"Кофейня Beans", address:"вул. Пушкінська, 7", instagram:"", telegram:"@beans_coffee", phone:"+380931234000",
    keychains:[], payments:[], pointOrders:[], note:"" },
];

async function loadData(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}
async function saveData(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
}

// Считаем итог по заказу
function calcOrder(o, filaments) {
  const fil = filaments.find(f => f.name === o.filament);
  const matCost   = Number(o.grams||0) * (fil ? fil.cost : 0);
  const elecCost  = Number(o.printHours||0) * 4.5;
  const modelCost = o.hasModel ? Number(o.modelHours||0) * Number(o.modelRate||0) : 0;
  const cost      = matCost + elecCost;
  const revenue   = Number(o.price||0) + modelCost;
  const profit    = revenue - cost;
  return { matCost, elecCost, modelCost, cost, revenue, profit };
}

function App() {
  const [tab, setTab]             = useState("orders");
  const [orders, setOrders]       = useState(SEED_ORDERS);
  const [filaments, setFilaments] = useState(SEED_FILAMENTS);
  const [points, setPoints]       = useState(SEED_POINTS);
  const [loaded, setLoaded]       = useState(false);
  const [prefill, setPrefill]     = useState(null); // data from AI to prefill calculator

  useEffect(() => {
    (async () => {
      const [o,f,p] = await Promise.all([
        loadData("3dp2_orders", SEED_ORDERS),
        loadData("3dp2_filaments", SEED_FILAMENTS),
        loadData("3dp3_points", SEED_POINTS),
      ]);
      // Always normalize points on load
      const clean = (s) => (!s || ["—","-","–"].includes(s.trim())) ? "" : s.trim();
      const normalizePoint = (pt) => ({
        ...pt,
        keychains: Array.isArray(pt.keychains) ? pt.keychains : (Array.isArray(pt.items) ? pt.items.map(i=>({...i, sold:i.sold||0, paid:false})) : []),
        payments:  Array.isArray(pt.payments)  ? pt.payments  : [],
        instagram: clean(pt.instagram),
        telegram:  clean(pt.telegram),
        phone:     clean(pt.phone || pt.contact),
        note:      pt.note || "",
        name:      pt.name || "",
        address:   pt.address || "",
        id:        pt.id || uid(),
        pointOrders: Array.isArray(pt.pointOrders) ? pt.pointOrders : [],
        type: pt.type || 'consignment',
      });
      const normalizedPoints = Array.isArray(p) ? p.map(normalizePoint) : SEED_POINTS.map(normalizePoint);
      setOrders(o); setFilaments(f); setPoints(normalizedPoints);
      setLoaded(true);
    })();
  }, []);
  useEffect(() => { if(loaded) saveData("3dp2_orders",    orders);    }, [orders,    loaded]);
  useEffect(() => { if(loaded) saveData("3dp2_filaments", filaments);  }, [filaments, loaded]);
  useEffect(() => { if(loaded) saveData("3dp3_points",    points);     }, [points,    loaded]);

  if (!loaded) return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:"#F7F8FA" }}>
      <div style={{ textAlign:"center", color:"#555" }}><div style={{ fontSize:40 }}>🖨</div><div style={{ marginTop:12 }}>Загрузка...</div></div>
    </div>
  );

  // Сводные финансы по выданным заказам
  const doneOrders   = orders.filter(o => o.status === "Выдан");
  const totalRevenue = doneOrders.reduce((s,o) => s + calcOrder(o,filaments).revenue, 0);
  const totalCost    = doneOrders.reduce((s,o) => s + calcOrder(o,filaments).cost, 0);
  const pointOrdersRevenue = points.reduce((s,p) => s + (p.pointOrders||[]).reduce((a,o) => a + (o.price||0), 0), 0);
  const pointOrdersCost    = points.reduce((s,p) => s + (p.pointOrders||[]).reduce((a,o) => a + (o.cost||0), 0), 0);
  // Payments from all points (buyout payments + consignment payments)
  const pointPayments      = points.reduce((s,p) => s + (p.payments||[]).reduce((a,pay) => a + (pay.amount||0), 0), 0);
  const netProfit    = (totalRevenue - totalCost) + (pointOrdersRevenue - pointOrdersCost) + pointPayments;
  const activeOrders = orders.filter(o => ["Новый","В работе"].includes(o.status)).length;
  const lowFilament  = filaments.filter(f => f.stock < 200).length;
  const totalItems   = points.reduce((s,p) => s + (p.keychains||[]).reduce((a,k) => a + Math.max(0,(k.qty||0)-(k.sold||0)), 0), 0);

  const TABS = [
    { key:"ai",        label:"🤖 Новий заказ" },
    { key:"orders",    label:"📦 Заказы" },
    { key:"calc",      label:"🧮 Калькулятор" },
    { key:"filament",  label:"🎞 Філамент" },
    { key:"points",    label:"📍 Точки" },
    { key:"dashboard", label:"📊 Зведення" },
  ];

  return (
    <div style={{ minHeight:"100vh", background:"#F7F8FA", fontFamily:"'Segoe UI',system-ui,sans-serif", color:"#1a1a2e" }}>
      <div style={{ background:"linear-gradient(135deg,#1a1a2e 0%,#16213e 60%,#0f3460 100%)", padding:"16px 24px", display:"flex", alignItems:"center", gap:12, flexWrap:"wrap" }}>
        <span style={{ fontSize:28 }}>🖨</span>
        <div>
          <div style={{ color:"#fff", fontWeight:700, fontSize:18 }}>3D Print Manager</div>
          <div style={{ color:"#a0aec0", fontSize:12 }}>Управление бизнесом &nbsp;<span style={{ color:"#2ECC71" }}>● сохранено</span></div>
        </div>
        <div style={{ marginLeft:"auto", display:"flex", gap:6, flexWrap:"wrap" }}>
          {TABS.map(t => (
            <button key={t.key} onClick={() => setTab(t.key)} style={{
              background: tab===t.key ? "#e94560" : "rgba(255,255,255,0.08)",
              color: tab===t.key ? "#fff" : "#a0aec0",
              border:"none", borderRadius:8, padding:"6px 12px", cursor:"pointer", fontSize:13, fontWeight:600,
            }}>{t.label}</button>
          ))}
        </div>
      </div>
      <div style={{ padding:"24px 20px", maxWidth:1100, margin:"0 auto" }}>
        {tab==="dashboard" && <Dashboard orders={orders} filaments={filaments} points={points} totalRevenue={totalRevenue} totalCost={totalCost} netProfit={netProfit} pointOrdersRevenue={pointOrdersRevenue} pointOrdersCost={pointOrdersCost} pointPayments={pointPayments} activeOrders={activeOrders} lowFilament={lowFilament} totalItems={totalItems} calcOrder={calcOrder}/>}
        {tab==="ai"        && <AIOrder orders={orders} setOrders={setOrders} filaments={filaments} calcOrder={calcOrder} setTab={setTab} setPrefill={setPrefill}/>}
        {tab==="orders"    && <Orders    orders={orders} setOrders={setOrders} filaments={filaments} calcOrder={calcOrder}/>}
        {tab==="calc"      && <Calculator filaments={filaments} prefill={prefill} setPrefill={setPrefill} setOrders={setOrders}/>}
        {tab==="filament"  && <FilamentTab filaments={filaments} setFilaments={setFilaments}/>}
        {tab==="points"    && <PointsTab  points={points} setPoints={setPoints}/>}
      </div>
    </div>
  );
}

// ── INVOICE HELPER ────────────────────────────────────────────────────────────
function buildInvoiceHTML(type, ptKc, invoice, pt) {
  var CSS = 'body{font-family:Arial,sans-serif;padding:16px;color:#111;max-width:800px;margin:0 auto}'
    + 'h2{color:#0f3460;text-align:center;margin-bottom:8px}'
    + 'p{margin:4px 0 8px;font-size:14px}'
    + 'table{width:100%;border-collapse:collapse;margin:12px 0}'
    + 'th,td{padding:8px 10px;border:1px solid #ddd;font-size:13px}'
    + 'th{background:#f0f0f0;font-weight:600}'
    + '.sign{display:flex;justify-content:space-between;margin-top:28px;padding-top:12px;border-top:1px dashed #ccc;font-size:13px}'
    + '.total{font-weight:700;background:#e8f8f0}';

  var nowDate = new Date().toISOString().slice(0,10);
  var ptType = pt.type === 'buyout' ? 'Викуп' : 'Реалізація';
  var addr = pt.address ? ' · ' + pt.address : '';
  var header = '<p><strong>Заклад:</strong> ' + pt.name + addr + '</p>'
    + '<p><strong>Тип:</strong> ' + ptType + '</p>';
  var body = '';

  if (type === 'general') {
    var rows = '';
    var totalQty = 0; var totalSum = 0;
    for (var i = 0; i < ptKc.length; i++) {
      var k = ptKc[i];
      var rem = k.qty - k.sold;
      var sum = rem * k.price;
      totalQty += rem; totalSum += sum;
      var bg = i % 2 === 0 ? '#fff' : '#f9f9f9';
      rows += '<tr style="background:' + bg + '"><td>' + k.name + '</td>'
        + '<td style="text-align:center">' + rem + ' шт</td>'
        + '<td style="text-align:center">' + k.price + ' грн</td>'
        + '<td style="text-align:right;font-weight:700">' + sum + ' грн</td></tr>';
    }
    body = '<h2>НАКЛАДНА ЗАЛИШКІВ</h2>'
      + '<p style="text-align:center;color:#888">Дата: ' + nowDate + '</p>'
      + header
      + '<table><thead><tr><th>Назва</th><th>Кількість</th><th>Ціна</th><th>Сума</th></tr></thead>'
      + '<tbody>' + rows
      + '<tr class="total"><td>РАЗОМ</td><td style="text-align:center">' + totalQty + ' шт</td><td></td>'
      + '<td style="text-align:right">' + totalSum + ' грн</td></tr>'
      + '</tbody></table>'
      + '<div class="sign"><div>Підтверджую: _______________</div><div>Дата: _______________</div></div>';
  } else if (invoice) {
    var rows2 = '';
    var tQty = 0; var tSum = 0;
    for (var j = 0; j < invoice.newItems.length; j++) {
      var item = invoice.newItems[j];
      var s = item.qty * item.price;
      tQty += item.qty; tSum += s;
      var bg2 = j % 2 === 0 ? '#fff' : '#f9f9f9';
      rows2 += '<tr style="background:' + bg2 + '"><td>' + item.name + '</td>'
        + '<td style="text-align:center">' + item.qty + ' шт</td>'
        + '<td style="text-align:center">' + item.price + ' грн</td>'
        + '<td style="text-align:right;font-weight:700">' + s + ' грн</td></tr>';
    }
    body = '<h2>НАКЛАДНА НА ПОСТАЧАННЯ</h2>'
      + '<p style="text-align:center;color:#888">Дата: ' + invoice.date + '</p>'
      + header
      + '<table><thead><tr><th>Назва</th><th>Кількість</th><th>Ціна</th><th>Сума</th></tr></thead>'
      + '<tbody>' + rows2
      + '<tr class="total"><td>РАЗОМ</td><td style="text-align:center">' + tQty + ' шт</td><td></td>'
      + '<td style="text-align:right">' + tSum + ' грн</td></tr>'
      + '</tbody></table>'
      + '<div class="sign"><div>Здав: _______________</div><div>Прийняв: _______________</div></div>';
  }

  return '<!DOCTYPE html><html><head><meta charset="UTF-8">'
    + '<meta name="viewport" content="width=device-width,initial-scale=1">'
    + '<style>' + CSS + '</style></head><body>' + body + '</body></html>';
}

function showInvoiceOverlay(type, ptKc, invoice, pt) {
  var html = buildInvoiceHTML(type, ptKc, invoice, pt);
  // Remove old overlay if exists
  var old = document.getElementById('invoice-overlay');
  if (old) old.remove();
  // Create overlay
  var overlay = document.createElement('div');
  overlay.id = 'invoice-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;background:#fff;overflow:auto;display:flex;flex-direction:column';
  // Toolbar
  var toolbar = document.createElement('div');
  toolbar.style.cssText = 'background:#0f3460;color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;position:sticky;top:0';
  var closeBtn = document.createElement('button');
  closeBtn.textContent = 'X Закрити';
  closeBtn.style.cssText = 'background:#e94560;border:none;color:#fff;padding:7px 16px;border-radius:8px;font-size:14px;cursor:pointer;font-weight:600';
  closeBtn.onclick = function() { document.getElementById('invoice-overlay').remove(); };
  var title = document.createElement('strong');
  title.textContent = 'Накладна';
  title.style.fontSize = '15px';
  toolbar.appendChild(title);
  toolbar.appendChild(closeBtn);
  // Content div - direct HTML injection (works in all browsers/Telegram)
  var content = document.createElement('div');
  content.style.cssText = 'flex:1;overflow:auto;padding:20px;font-family:Arial,sans-serif;color:#111;background:#fff';
  // Extract body content from html string
  var bodyMatch = html.match(/<body>([\s\S]*)<\/body>/);
  var styleMatch = html.match(/<style>([\s\S]*?)<\/style>/);
  if (styleMatch) {
    var styleEl = document.createElement('style');
    styleEl.textContent = styleMatch[1];
    overlay.appendChild(styleEl);
  }
  content.innerHTML = bodyMatch ? bodyMatch[1] : html;
  overlay.appendChild(toolbar);
  overlay.appendChild(content);
  document.body.appendChild(overlay);
}

// ── DASHBOARD ──────────────────────────────────────────────────────────────────
function Dashboard({ orders, filaments, points, totalRevenue, totalCost, netProfit, pointOrdersRevenue, pointOrdersCost, pointPayments, activeOrders, lowFilament, totalItems, calcOrder }) {
  const [period, setPeriod] = useState("month"); // week | month | year | all
  const byStatus  = Object.keys(STATUS_COLORS).map(s => ({ s, n: orders.filter(o=>o.status===s).length }));
  const recent    = [...orders].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);
  const withModel = orders.filter(o=>o.hasModel && o.status==="Выдан").length;

  // ── Period filter ──
  const now = new Date();
  const periodStart = {
    week:  new Date(now.getFullYear(), now.getMonth(), now.getDate()-6).toISOString().slice(0,10),
    month: new Date(now.getFullYear(), now.getMonth(), 1).toISOString().slice(0,10),
    year:  new Date(now.getFullYear(), 0, 1).toISOString().slice(0,10),
    all:   "2000-01-01",
  }[period];

  const periodOrders = orders.filter(o => o.status==="Выдан" && o.date >= periodStart);
  const periodRev    = periodOrders.reduce((s,o) => s + calcOrder(o,filaments).revenue, 0);
  const periodCost   = periodOrders.reduce((s,o) => s + calcOrder(o,filaments).cost, 0);
  const periodPtRev      = points.reduce((s,p) => s + (p.pointOrders||[]).filter(o=>o.date>=periodStart).reduce((a,o)=>a+(o.price||0),0), 0);
  const periodPtCost     = points.reduce((s,p) => s + (p.pointOrders||[]).filter(o=>o.date>=periodStart).reduce((a,o)=>a+(o.cost||0),0), 0);
  const periodPtPayments = points.reduce((s,p) => s + (p.payments||[]).filter(pay=>pay.date>=periodStart).reduce((a,pay)=>a+(pay.amount||0),0), 0);
  const periodProfit = (periodRev - periodCost) + (periodPtRev - periodPtCost) + periodPtPayments;

  // ── Chart: last 6 months revenue ──
  const months = Array.from({length:6}, (_,i) => {
    const d = new Date(now.getFullYear(), now.getMonth()-5+i, 1);
    return { key: d.toISOString().slice(0,7), label: d.toLocaleString("uk",{month:"short"}) };
  });
  const monthData = months.map(m => {
    const rev = orders.filter(o=>o.status==="Выдан"&&o.date.startsWith(m.key)).reduce((s,o)=>s+calcOrder(o,filaments).revenue,0)
              + points.reduce((s,p)=>(p.pointOrders||[]).filter(o=>o.date.startsWith(m.key)).reduce((a,o)=>a+(o.price||0),s),0);
    const cost= orders.filter(o=>o.status==="Выдан"&&o.date.startsWith(m.key)).reduce((s,o)=>s+calcOrder(o,filaments).cost,0)
              + points.reduce((s,p)=>(p.pointOrders||[]).filter(o=>o.date.startsWith(m.key)).reduce((a,o)=>a+(o.cost||0),s),0);
    return { ...m, rev, profit: rev-cost };
  });
  const maxRev = Math.max(...monthData.map(m=>m.rev), 1);

  // ── Best selling keychains ──
  const kcSales = {};
  points.forEach(p => (p.keychains||[]).forEach(k => {
    kcSales[k.name] = (kcSales[k.name]||0) + (k.sold||0);
  }));
  const topKc = Object.entries(kcSales).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const PERIODS = [["week","Тиждень"],["month","Місяць"],["year","Рік"],["all","Весь час"]];

  return (
    <div>
      <h2 style={h2}>📊 Зведення</h2>

      {/* Period selector */}
      <div style={{ display:"flex", gap:6, marginBottom:20, flexWrap:"wrap" }}>
        {PERIODS.map(([k,l])=>(
          <button key={k} onClick={()=>setPeriod(k)} style={{
            background: period===k?"#e94560":"#fff", color: period===k?"#fff":"#555",
            border:"1px solid #e0e0e0", borderRadius:20, padding:"6px 16px", cursor:"pointer", fontWeight:600, fontSize:13
          }}>{l}</button>
        ))}
      </div>

      {/* Period stats */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))", gap:12, marginBottom:20 }}>
        {[
          { label:"Виручка", value:`${fmt(periodRev+periodPtRev+periodPtPayments)} грн`, color:"#3498DB", bg:"#e8f4fd" },
          { label:"Витрати", value:`${fmt(periodCost+periodPtCost)} грн`, color:"#E74C3C", bg:"#fdecea" },
          { label:"Прибуток", value:`${fmt(periodProfit)} грн`, color: periodProfit>=0?"#27ae60":"#e74c3c", bg: periodProfit>=0?"#f0fff4":"#fdecea" },
          { label:"Заказів", value:periodOrders.length, color:"#9B59B6", bg:"#f5f0ff" },
        ].map(s=>(
          <div key={s.label} style={{ background:s.bg, borderRadius:12, padding:"14px 16px" }}>
            <div style={{ fontSize:11, color:"#888", marginBottom:4 }}>{s.label}</div>
            <div style={{ fontSize:20, fontWeight:800, color:s.color }}>{s.value}</div>
          </div>
        ))}
      </div>

      {/* Revenue chart */}
      <div style={{ background:"#fff", borderRadius:14, padding:20, boxShadow:"0 2px 8px #0001", marginBottom:20 }}>
        <div style={{ fontWeight:700, fontSize:14, color:"#0f3460", marginBottom:16 }}>📈 Виручка за 6 місяців</div>
        <div style={{ display:"flex", alignItems:"flex-end", gap:8, height:120 }}>
          {monthData.map(m=>(

                <div style={{ width:"100%", background:"#3498DB", borderRadius:"4px 4px 0 0",

        <div style={{ display:"flex", gap:16, marginTop:10, fontSize:11, color:"#888" }}>
          <span><span style={{display:"inline-block",width:10,height:10,background:"#3498DB",borderRadius:2,marginRight:4}}/>Виручка</span>
          <span><span style={{display:"inline-block",width:10,height:10,background:"#2ECC71",borderRadius:2,marginRight:4}}/>Прибуток</span>
        </div>
      </div>

      {/* Top keychains + status grid */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:20, marginBottom:20 }}>
        <Card title="🏆 Топ брелки в точках">
          {topKc.length===0
            ? <div style={{ color:"#bbb", fontSize:13 }}>Ще немає продажів</div>
            : topKc.map(([name,sold],i)=>(
              <div key={name} style={{ display:"flex", alignItems:"center", gap:10, padding:"6px 0", borderBottom:"1px solid #f0f0f0" }}>
                <span style={{ fontSize:16, minWidth:24 }}>{["🥇","🥈","🥉","4️⃣","5️⃣"][i]}</span>

              <StatusBadge s={s}/><strong>{n}</strong>

      {/* Total all time */}
      <div style={{ background:"linear-gradient(135deg,#0f3460,#16213e)", borderRadius:16, padding:20, color:"#fff", marginBottom:20 }}>
        <div style={{ fontSize:12, color:"#a0aec0", marginBottom:12, fontWeight:600, letterSpacing:1, textTransform:"uppercase" }}>Всього за весь час</div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))", gap:12 }}>
          {[
            { label:"Виручка",       value:`${fmt(totalRevenue+pointOrdersRevenue+pointPayments)} грн`, color:"#3498DB" },
            { label:"Витрати",       value:`${fmt(totalCost+pointOrdersCost)} грн`,        color:"#E74C3C" },
            { label:"Чистий прибуток",value:`${fmt(netProfit)} грн`,                       color:"#2ECC71" },
            { label:"Заказів виконано",value:orders.filter(o=>o.status==="Выдан").length,  color:"#9B59B6" },
          ].map(s=>(
            <div key={s.label} style={{ background:"rgba(255,255,255,0.07)", borderRadius:10, padding:"12px 14px", borderTop:`3px solid ${s.color}` }}>
              <div style={{ fontSize:10, color:"#a0aec0" }}>{s.label}</div>
              <div style={{ fontSize:18, fontWeight:800, color:s.color }}>{s.value}</div>

      <Card title="Останні закази">
        {recent.map(o => {
          const c = calcOrder(o, filaments);
          return (
            <div key={o.id} style={{ padding:"6px 0", borderBottom:"1px solid #f0f0f0" }}>
              <div style={{ display:"flex", justifyContent:"space-between" }}>

    </div>
  );
}

// ── ORDERS ─────────────────────────────────────────────────────────────────────
function Orders({ orders, setOrders, filaments, calcOrder }) {
  const [search, setSearch]       = useState("");
  const [filterStatus, setFilter] = useState("Все");
  const [showForm, setShowForm]   = useState(false);
  const [editing, setEditing]     = useState(null);
  const emptyForm = { client:"", phone:"", item:"", grams:"", printHours:"", price:"", hasModel:false, modelHours:"", modelRate:100, status:"Новый", date:today(), filament:filaments[0]?.name||"", note:"" };
  const [form, setForm] = useState(emptyForm);

  const filtered = orders.filter(o => {
    const q = search.toLowerCase();
    return (!q || o.client.toLowerCase().includes(q) || o.item.toLowerCase().includes(q) || o.phone.includes(q))
      && (filterStatus==="Все" || o.status===filterStatus);
  });

  const openNew  = () => { setEditing(null); setForm(emptyForm); setShowForm(true); };
  const openEdit = (o) => { setEditing(o.id); setForm({...o}); setShowForm(true); };
  const save = () => {
    if(!form.client||!form.item) return alert("Заполните клиента и изделие");
    if(editing) setOrders(prev=>prev.map(o=>o.id===editing?{...form,id:editing}:o));
    else        setOrders(prev=>[{...form,id:uid()},...prev]);
    setShowForm(false);
  };
  const [confirmDel, setConfirmDel] = useState(null);
  const del = (id) => setConfirmDel(id);
  const doDelete = () => { setOrders(prev=>prev.filter(o=>o.id!==confirmDel)); setConfirmDel(null); };

  // Предпросмотр итогов в форме
  const preview = calcOrder(form, filaments);

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16, flexWrap:"wrap", gap:10 }}>
        <h2 style={h2}>📦 Закази</h2>
        <button onClick={openNew} style={btnPrimary}>+ Новий заказ</button>
      </div>
      <div style={{ display:"flex", gap:10, marginBottom:16, flexWrap:"wrap" }}>
        <input placeholder="🔍 Пошук..." value={search} onChange={e=>setSearch(e.target.value)} style={{...inputStyle,flex:1,minWidth:180}}/>
        <select value={filterStatus} onChange={e=>setFilter(e.target.value)} style={inputStyle}>
          <option>Все</option>
          {Object.keys(STATUS_COLORS).map(s=><option key={s}>{s}</option>)}
        </select>
      </div>

      {showForm && (
        <div style={modalOverlay}>
          <div style={modalBox}>
            <h3 style={{ margin:"0 0 16px", color:"#0f3460" }}>{editing?"Редагувати":"Новий"} заказ</h3>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
              <Field label="Клієнт *"       value={form.client}     onChange={v=>setForm(f=>({...f,client:v}))}/>
              <Field label="Телефон"        value={form.phone}      onChange={v=>setForm(f=>({...f,phone:v}))} placeholder="+380..."/>
              <div style={{ gridColumn:"1/-1" }}>
                <Field label="Виріб / опис *" value={form.item}    onChange={v=>setForm(f=>({...f,item:v}))}/>
              </div>
              <div>
                <label style={labelStyle}>Статус</label>
                <select value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))} style={{...inputStyle,width:"100%"}}>
                  {Object.keys(STATUS_COLORS).map(s=><option key={s}>{s}</option>)}
                </select>
              </div>
              <div>
                <label style={labelStyle}>Філамент</label>
                <select value={form.filament} onChange={e=>setForm(f=>({...f,filament:e.target.value}))} style={{...inputStyle,width:"100%"}}>
                  {filaments.map(fl=><option key={fl.id}>{fl.name}</option>)}
                </select>
              </div>
              <Field label="Грамів (г)"       type="number" value={form.grams}      onChange={v=>setForm(f=>({...f,grams:v}))}/>
              <Field label="Годин друку"       type="number" value={form.printHours} onChange={v=>setForm(f=>({...f,printHours:v}))} placeholder="0.5"/>
              <Field label="Ціна за друк (грн)"type="number" value={form.price}      onChange={v=>setForm(f=>({...f,price:v}))}/>
              <Field label="Дата"              type="date"   value={form.date}       onChange={v=>setForm(f=>({...f,date:v}))}/>
              <div style={{ gridColumn:"1/-1" }}>
                <Field label="Нотатка" value={form.note} onChange={v=>setForm(f=>({...f,note:v}))}/>
              </div>
            </div>

            {/* Блок разработки модели */}
            <div style={{ marginTop:4, marginBottom:12, border:"1px solid #e8e0f5", borderRadius:10, padding:14, background: form.hasModel?"#faf5ff":"#fafafa" }}>
              <label style={{ display:"flex", alignItems:"center", gap:10, cursor:"pointer", fontWeight:600, fontSize:14 }}>
                <input type="checkbox" checked={form.hasModel} onChange={e=>setForm(f=>({...f,hasModel:e.target.checked}))}
                  style={{ width:18, height:18, accentColor:"#9B59B6", cursor:"pointer" }}/>
                <span style={{ color: form.hasModel?"#9B59B6":"#888" }}>📐 Потрібна розробка 3D-моделі</span>
              </label>
              {form.hasModel && (
                <div style={{ marginTop:12, display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
                  <Field label="Годин на модель" type="number" value={form.modelHours} onChange={v=>setForm(f=>({...f,modelHours:v}))} placeholder="3"/>
                  <Field label="Ставка (грн/год)" type="number" value={form.modelRate}  onChange={v=>setForm(f=>({...f,modelRate:v}))} placeholder="100"/>
                  {Number(form.modelHours||0) > 0 && (
                    <div style={{ gridColumn:"1/-1", background:"#f0ebff", borderRadius:8, padding:"8px 12px", fontSize:13, color:"#6d28d9", fontWeight:600 }}>
                      💜 Вартість моделі: {Number(form.modelHours||0)} год × {Number(form.modelRate||0)} грн = <strong>{Number(form.modelHours||0)*Number(form.modelRate||0)} грн</strong>
                    </div>
                  )}
                </div>
              )}
            </div>

            {/* Итоги предпросмотра */}
            {(Number(form.grams)||Number(form.printHours)||Number(form.price)) ? (
              <div style={{ background:"linear-gradient(135deg,#0f3460,#16213e)", borderRadius:10, padding:14, color:"#fff", marginBottom:14 }}>
                <div style={{ fontSize:12, color:"#a0aec0", marginBottom:10, fontWeight:600 }}>ПІДСУМОК ЗАКАЗУ</div>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8, marginBottom:10 }}>
                  {[
                    ["🎞 Матеріал", `${fmt(preview.matCost)} грн`],
                    ["⚡ Електрика", `${fmt(preview.elecCost)} грн`],
                    ["📐 Модель", form.hasModel ? `${fmt(preview.modelCost)} грн` : "—"],
                  ].map(([l,v])=>(
                    <div key={l} style={{ background:"rgba(255,255,255,0.08)", borderRadius:8, padding:"8px 10px" }}>
                      <div style={{ fontSize:10, color:"#a0aec0" }}>{l}</div>
                      <div style={{ fontSize:14, fontWeight:700 }}>{v}</div>
                    </div>
                  ))}
                </div>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", borderTop:"1px solid rgba(255,255,255,0.1)", paddingTop:10 }}>
                  <div>
                    <div style={{ fontSize:11, color:"#a0aec0" }}>Собівартість</div>
                    <div style={{ fontSize:15, fontWeight:700, color:"#E74C3C" }}>{fmt(preview.cost)} грн</div>
                  </div>
                  <div>
                    <div style={{ fontSize:11, color:"#a0aec0" }}>Загальна виручка</div>
                    <div style={{ fontSize:15, fontWeight:700, color:"#3498DB" }}>{fmt(preview.revenue)} грн</div>
                  </div>
                  <div>
                    <div style={{ fontSize:11, color:"#a0aec0" }}>Чистий прибуток</div>
                    <div style={{ fontSize:18, fontWeight:800, color: preview.profit >= 0 ? "#2ECC71" : "#E74C3C" }}>{fmt(preview.profit)} грн</div>
                  </div>
                </div>
              </div>
            ) : null}

            <div style={{ display:"flex", gap:10 }}>
              <button onClick={save} style={btnPrimary}>💾 Зберегти</button>
              <button onClick={()=>setShowForm(false)} style={btnSecondary}>Скасувати</button>
            </div>
          </div>
        </div>
      )}

      {confirmDel && (
        <div style={modalOverlay}>
          <div style={{ background:"#fff", borderRadius:14, padding:28, maxWidth:340, width:"90%", textAlign:"center", boxShadow:"0 8px 40px #0004" }}>
            <div style={{ fontSize:36, marginBottom:10 }}>🗑</div>
            <div style={{ fontWeight:700, fontSize:16, marginBottom:8 }}>Видалити заказ?</div>
            <div style={{ color:"#888", fontSize:13, marginBottom:20 }}>Цю дію не можна скасувати</div>
            <div style={{ display:"flex", gap:10, justifyContent:"center" }}>
              <button onClick={doDelete} style={{ ...btnPrimary, background:"#e74c3c" }}>Так, видалити</button>
              <button onClick={()=>setConfirmDel(null)} style={btnSecondary}>Скасувати</button>
            </div>
          </div>
        </div>
      )}

      <div style={{ background:"#fff", borderRadius:12, boxShadow:"0 2px 8px #0001", overflow:"auto" }}>
        <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
          <thead>
            <tr style={{ background:"#f7f8fa", color:"#555" }}>
              {["Дата","Клієнт","Виріб","Друк","Модель","Виручка","Прибуток","Статус",""].map(h=>(
                <th key={h} style={{ padding:"10px 12px", textAlign:"left", fontWeight:600, whiteSpace:"nowrap" }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.length===0
              ? <tr><td colSpan={9} style={{ textAlign:"center", padding:32, color:"#999" }}>Заказів не знайдено</td></tr>
              : filtered.map((o,i) => {
                const c = calcOrder(o, filaments);
                return (
                  <tr key={o.id} style={{ borderTop:"1px solid #f0f0f0", background:i%2===0?"#fff":"#fafafa" }}>
                    <td style={td}>{o.date}</td>
                    <td style={{...td,fontWeight:600}}>
                      {o.client}
                      {o.phone && <div style={{fontSize:11,color:"#999"}}>{o.phone}</div>}
                    </td>
                    <td style={td}>
                      {o.item}
                      {o.note && <div style={{fontSize:11,color:"#999"}}>{o.note}</div>}
                    </td>
                    <td style={td}>{o.grams}г / {o.printHours}ч<div style={{fontSize:11,color:"#999"}}>{o.filament}</div></td>
                    <td style={td}>
                      {o.hasModel
                        ? <span style={{ background:"#f0ebff", color:"#9B59B6", borderRadius:20, padding:"2px 8px", fontSize:11, fontWeight:600, whiteSpace:"nowrap" }}>📐 {o.modelHours}ч × {o.modelRate} = {fmt(c.modelCost)} грн</span>
                        : <span style={{ color:"#ccc" }}>—</span>
                      }
                    </td>
                    <td style={{...td, fontWeight:700, color:"#0f3460"}}>{fmt(c.revenue)} грн</td>
                    <td style={{...td, fontWeight:700, color: c.profit>=0?"#27ae60":"#e74c3c"}}>{fmt(c.profit)} грн</td>
                    <td style={td}>
                      <select value={o.status} onChange={e=>setOrders(prev=>prev.map(x=>x.id===o.id?{...x,status:e.target.value}:x))}
                        style={{ border:`2px solid ${STATUS_COLORS[o.status]?.bg||"#eee"}`, background:STATUS_COLORS[o.status]?.bg||"#f5f5f5",
                          color:STATUS_COLORS[o.status]?.text||"#333", borderRadius:20, padding:"3px 10px", fontSize:12,
                          fontWeight:600, cursor:"pointer", outline:"none" }}>
                        {Object.keys(STATUS_COLORS).map(s=><option key={s} value={s}>{s}</option>)}
                      </select>
                    </td>
                    <td style={td}>
                      <button onClick={()=>openEdit(o)} style={btnIcon}>✏️</button>
                      <button onClick={()=>del(o.id)}   style={btnIcon}>🗑</button>
                    </td>
                  </tr>
                );
              })
            }
          </tbody>
        </table>
      </div>
      <div style={{ marginTop:8, color:"#888", fontSize:13 }}>Показано: {filtered.length} з {orders.length}</div>
    </div>
  );
}

// ── CALCULATOR ──────────────────────────────────────────────────────────────────
function Calculator({ filaments, prefill, setPrefill, setOrders }) {
  const [grams,      setGrams]      = useState(20);
  const [printHours, setPrintHours] = useState(1);
  const [filIdx,     setFilIdx]     = useState(0);
  const [markup,     setMarkup]     = useState(100);
  const [elec,       setElec]       = useState(4.5);
  const [hasModel,   setHasModel]   = useState(false);
  const [modelHours, setModelHours] = useState(3);
  const [modelRate,  setModelRate]  = useState(100);
  const [added, setAdded]           = useState(false);

  // When prefill arrives from AI, load client info
  const { useState: _, useEffect } = { useState, useEffect: (fn, deps) => { } };

  // Apply prefill on mount
  const [clientInfo, setClientInfo] = useState(null);
  if (prefill && !clientInfo) {
    setClientInfo(prefill);
    const fi = filaments.findIndex(f => f.name === prefill.filament);
    if (fi >= 0) setFilIdx(fi);
    setHasModel(prefill.hasModel || false);
    setPrefill(null);
  }

  const fil        = filaments[filIdx]||{cost:0.28};
  const matCost    = grams * fil.cost;
  const elecCost   = printHours * elec;
  const modelCost  = hasModel ? modelHours * modelRate : 0;
  const printCost  = matCost + elecCost;
  const printPrice = printCost * (1 + markup/100);
  const totalPrice = printPrice + modelCost;
  const profit     = totalPrice - printCost;

  const addOrder = () => {
    const newOrder = {
      id:         uid(),
      client:     clientInfo?.client || "",
      phone:      clientInfo?.phone  || "",
      item:       clientInfo?.item   || "",
      grams,
      printHours,
      price:      Math.round(printPrice),
      hasModel,
      modelHours: hasModel ? modelHours : 0,
      modelRate,
      status:     "Новый",
      date:       today(),
      filament:   fil.name,
      note:       [clientInfo?.deadline ? `Термін: ${clientInfo.deadline}` : "", clientInfo?.note || ""].filter(Boolean).join(" | "),
    };
    setOrders(prev => [newOrder, ...prev]);
    setAdded(true);
    setTimeout(() => setAdded(false), 3000);
  };

  return (
    <div>
      <h2 style={h2}>🧮 Калькулятор</h2>

      {/* Client info banner if came from AI */}
      {clientInfo && (
        <div style={{ background:"linear-gradient(135deg,#f0ebff,#e8f4fd)", borderRadius:12, padding:"14px 18px", marginBottom:20, display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:10 }}>
          <div>
            <div style={{ fontSize:12, color:"#9B59B6", fontWeight:700, marginBottom:4 }}>🤖 Заказ від клієнта</div>
            <div style={{ fontWeight:700, fontSize:15 }}>{clientInfo.client} {clientInfo.phone && <span style={{color:"#888",fontWeight:400,fontSize:13}}>· {clientInfo.phone}</span>}</div>
            <div style={{ fontSize:13, color:"#555", marginTop:2 }}>{clientInfo.item}</div>
            {clientInfo.deadline && <div style={{ fontSize:12, color:"#F39C12", marginTop:2 }}>📅 {clientInfo.deadline}</div>}
          </div>
          <button onClick={()=>setClientInfo(null)} style={{ background:"none", border:"1px solid #ddd", borderRadius:8, padding:"4px 12px", cursor:"pointer", fontSize:12, color:"#888" }}>✕ Очистити</button>
        </div>
      )}

      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:20 }}>
        <Card title="Параметри друку">
          <Slider label="Грамів філаменту"    value={grams}      min={1}   max={500} onChange={setGrams}      unit="г"/>
          <Slider label="Годин друку"          value={printHours} min={0.1} max={48}  step={0.1} onChange={setPrintHours} unit="год"/>
          <Slider label="Електрика (грн/год)" value={elec}       min={1}   max={20}  step={0.5} onChange={setElec}       unit="грн/год"/>
          <Slider label="Наценка на друк"      value={markup}     min={0}   max={500} step={5}   onChange={setMarkup}     unit="%"/>
          <div style={{ marginTop:12 }}>
            <label style={labelStyle}>Філамент</label>
            <select value={filIdx} onChange={e=>setFilIdx(+e.target.value)} style={{...inputStyle,width:"100%"}}>
              {filaments.map((f,i)=><option key={f.id} value={i}>{f.name} ({f.cost} грн/г)</option>)}
            </select>
          </div>
        </Card>

        <div>
          <Card title="Розробка 3D-моделі">
            <label style={{ display:"flex", alignItems:"center", gap:10, cursor:"pointer", marginBottom:14, fontWeight:600 }}>
              <input type="checkbox" checked={hasModel} onChange={e=>setHasModel(e.target.checked)}
                style={{ width:18, height:18, accentColor:"#9B59B6", cursor:"pointer" }}/>
              <span style={{ color:hasModel?"#9B59B6":"#888" }}>Замовили розробку моделі</span>
            </label>
            {hasModel ? (
              <>
                <Slider label="Годин на модель"  value={modelHours} min={0.5} max={40}  step={0.5} onChange={setModelHours} unit="год"/>
                <Slider label="Ставка за годину" value={modelRate}  min={50}  max={500} step={50}  onChange={setModelRate}  unit="грн/год"/>
                <div style={{ background:"#f0ebff", borderRadius:8, padding:"10px 14px", fontSize:14, color:"#6d28d9", fontWeight:600, marginTop:4 }}>
                  💜 Вартість моделі: {modelHours} × {modelRate} = <strong>{modelHours*modelRate} грн</strong>
                </div>
              </>
            ) : (
              <div style={{ color:"#bbb", fontSize:13, padding:"20px 0", textAlign:"center" }}>
                Включіть, якщо потрібна розробка моделі під замовлення
              </div>
            )}
          </Card>
        </div>
      </div>

      {/* Результат */}
      <div style={{ marginTop:20, background:"linear-gradient(135deg,#0f3460,#16213e)", borderRadius:16, padding:24, color:"#fff" }}>

function FilamentTab({ filaments, setFilaments }) {
  const [newName, setNewName] = useState("");

  const updateCost = (id, val) => {
    const v = parseFloat(val);
    if(isNaN(v) || v <= 0) return;
    setFilaments(prev => prev.map(f => f.id===id ? {...f, cost: v} : f));
  };

  const del = (id) => setFilaments(prev => prev.filter(f => f.id !== id));

  const addFilament = () => {
    if(!newName.trim()) return;
    setFilaments(prev => [...prev, { id: uid(), name: newName.trim(), color: "#aaa", stock: 1000, cost: 0.28 }]);

    <div>

// ── POINTS ─────────────────────────────────────────────────────────────────────
function PointsTab({ points, setPoints }) {
  const [profile, setProfile] = useState(null); // id of open profile
  const [showForm, setShowForm] = useState(false);
  const [editId, setEditId]    = useState(null);
  const emptyPt = { name:"", address:"", instagram:"", telegram:"", phone:"", note:"", type:"consignment" }; // consignment=реалізація, buyout=викуп
  const [form, setForm] = useState(emptyPt);
  const [confirmDel, setConfirmDel] = useState(null);

  const save = () => {
    if(!form.name) return;
    if(editId) setPoints(prev=>prev.map(p=>p.id===editId?{...p,...form}:p));
    else       setPoints(prev=>[...prev,{...form, id:uid(), keychains:[], payments:[], pointOrders:[], instagram:form.instagram||'', telegram:form.telegram||'', phone:form.phone||'', note:form.note||'', type:form.type||'consignment'}]);
    setShowForm(false); setEditId(null);
  };
  const del = () => { setPoints(prev=>prev.filter(p=>p.id!==confirmDel)); setConfirmDel(null); if(profile===confirmDel) setProfile(null); };

  const openProfile = (id) => setProfile(id);
  const pt = points.find(p=>p.id===profile);

  // helpers
  const kc           = (p) => p.keychains || [];
  const pays         = (p) => p.payments  || [];
  const totalStock   = (p) => kc(p).reduce((s,k)=>s+k.qty,0);
  const totalSold    = (p) => kc(p).reduce((s,k)=>s+k.sold,0);
  const totalInStock = (p) => kc(p).reduce((s,k)=>s+(k.qty-k.sold)*k.price,0);
  const totalUnpaid  = (p) => kc(p).reduce((s,k)=>s+k.sold*k.price,0) - pays(p).reduce((s,pay)=>s+pay.amount,0);
  const totalEarned  = (p) => pays(p).reduce((s,pay)=>s+pay.amount,0);
  const thisMonth    = (p) => { const m=new Date().toISOString().slice(0,7); return pays(p).filter(pay=>pay.date.startsWith(m)).reduce((s,pay)=>s+pay.amount,0); };

  if (profile && pt) return <PointProfile pt={pt} setPoints={setPoints} onBack={()=>setProfile(null)}
    totalStock={totalStock} totalSold={totalSold} totalInStock={totalInStock}
    totalUnpaid={totalUnpaid} totalEarned={totalEarned} thisMonth={thisMonth}/>;

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
        <h2 style={h2}>📍 Точки продажу</h2>
        <div style={{ display:"flex", gap:8 }}>
          <button onClick={()=>{ if(window.confirm && window.confirm("Скинути всі точки до нуля?")) { setPoints([]); } else { setPoints([]); } }} 
            style={{ ...btnSecondary, fontSize:12, padding:"6px 12px", color:"#e74c3c" }}>🗑 Скинути</button>
          <button onClick={()=>{setEditId(null);setForm(emptyPt);setShowForm(true)}} style={btnPrimary}>+ Додати точку</button>
        </div>
      </div>

      {showForm && (
        <div style={modalOverlay}>
          <div style={modalBox}>
            <h3 style={{ margin:"0 0 16px", color:"#0f3460" }}>{editId?"Редагувати":"Нова"} точка</h3>
            <Field label="Назва *"    value={form.name}      onChange={v=>setForm(f=>({...f,name:v}))}/>
            <Field label="Адреса"     value={form.address}   onChange={v=>setForm(f=>({...f,address:v}))}/>
            <div style={{ marginBottom:10 }}>
              <label style={labelStyle}>Тип співпраці</label>
              <div style={{ display:"flex", gap:8 }}>
                <button type="button" onClick={()=>setForm(f=>({...f,type:"consignment"}))} style={{
                  flex:1, padding:"10px", border:`2px solid ${form.type!=="buyout"?"#e94560":"#e0e0e0"}`,
                  borderRadius:10, cursor:"pointer", background:form.type!=="buyout"?"#fff5f7":"#fafafa",
                  color:form.type!=="buyout"?"#e94560":"#888", fontWeight:600, fontSize:13
                }}>🔄 На реалізацію<div style={{fontSize:11,fontWeight:400,marginTop:2}}>платять за продане</div></button>
                <button type="button" onClick={()=>setForm(f=>({...f,type:"buyout"}))} style={{
                  flex:1, padding:"10px", border:`2px solid ${form.type==="buyout"?"#27ae60":"#e0e0e0"}`,
                  borderRadius:10, cursor:"pointer", background:form.type==="buyout"?"#f0fff4":"#fafafa",
                  color:form.type==="buyout"?"#27ae60":"#888", fontWeight:600, fontSize:13
                }}>💰 Викуп<div style={{fontSize:11,fontWeight:400,marginTop:2}}>платять одразу</div></button>
              </div>
            </div>
            <Field label="Instagram"  value={form.instagram} onChange={v=>setForm(f=>({...f,instagram:v}))} placeholder="@назва"/>
            <Field label="Telegram"   value={form.telegram}  onChange={v=>setForm(f=>({...f,telegram:v}))} placeholder="@назва"/>
            <Field label="Телефон"    value={form.phone}     onChange={v=>setForm(f=>({...f,phone:v}))} placeholder="+380..."/>
            <Field label="Нотатка"    value={form.note}      onChange={v=>setForm(f=>({...f,note:v}))}/>
            <div style={{ display:"flex", gap:10, marginTop:14 }}>
              <button onClick={save} style={btnPrimary}>Зберегти</button>
              <button onClick={()=>setShowForm(false)} style={btnSecondary}>Скасувати</button>
            </div>
          </div>
        </div>
      )}

      {confirmDel && (
        <div style={modalOverlay}>
          <div style={{ background:"#fff", borderRadius:14, padding:28, maxWidth:340, width:"90%", textAlign:"center", boxShadow:"0 8px 40px #0004" }}>
            <div style={{ fontSize:36, marginBottom:10 }}>🗑</div>
            <div style={{ fontWeight:700, fontSize:16, marginBottom:8 }}>Видалити точку?</div>
            <div style={{ display:"flex", gap:10, justifyContent:"center" }}>
              <button onClick={del} style={{ ...btnPrimary, background:"#e74c3c" }}>Так</button>
              <button onClick={()=>setConfirmDel(null)} style={btnSecondary}>Скасувати</button>
            </div>
          </div>
        </div>
      )}

      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))", gap:16 }}>
        {points.map(p => { p = {...p, keychains: p.keychains||[], payments: p.payments||[] };
          const unpaid = totalUnpaid(p);
          const inStock = totalInStock(p);
          return (
            <div key={p.id} onClick={()=>openProfile(p.id)}
              style={{ background:"#fff", borderRadius:14, padding:20, boxShadow:"0 2px 10px #0001", cursor:"pointer", transition:"box-shadow .15s, transform .15s" }}
              onMouseEnter={e=>{e.currentTarget.style.boxShadow="0 6px 24px #0002";e.currentTarget.style.transform="translateY(-2px)"}}
              onMouseLeave={e=>{e.currentTarget.style.boxShadow="0 2px 10px #0001";e.currentTarget.style.transform="none"}}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                <div>
                  <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                    <span style={{ fontWeight:700, fontSize:17 }}>📍 {p.name}</span>
                    <span style={{ fontSize:11, fontWeight:600, borderRadius:20, padding:"2px 8px", background:p.type==="buyout"?"#f0fff4":"#fff5f7", color:p.type==="buyout"?"#27ae60":"#e94560" }}>{p.type==="buyout"?"💰 Викуп":"🔄 Реалізація"}</span>
                  </div>
                  <div style={{ color:"#888", fontSize:13, marginTop:2 }}>{p.address}</div>
                </div>
                <div style={{ display:"flex", gap:4 }} onClick={e=>e.stopPropagation()}>
                  <button onClick={()=>{setEditId(p.id);setForm({name:p.name,address:p.address,instagram:p.instagram||"",telegram:p.telegram||"",phone:p.phone||"",note:p.note||"",type:p.type||"consignment"});setShowForm(true)}} style={btnIcon}>✏️</button>
                  <button onClick={()=>setConfirmDel(p.id)} style={btnIcon}>🗑</button>
                </div>
              </div>
              <div style={{ display:"flex", gap:8, marginTop:14, flexWrap:"wrap" }}>
                {p.instagram && !["—","-",""].includes(p.instagram.trim()) && <span style={{ fontSize:12, background:"#f5f0ff", color:"#9B59B6", borderRadius:20, padding:"2px 10px" }}>📸 {p.instagram}</span>}
                {p.telegram  && !["—","-",""].includes(p.telegram.trim())  && <span style={{ fontSize:12, background:"#e8f4fd", color:"#1a6fa8", borderRadius:20, padding:"2px 10px" }}>✈️ {p.telegram}</span>}
                {p.phone     && !["—","-",""].includes(p.phone.trim())     && <span style={{ fontSize:12, background:"#f0fff4", color:"#27ae60", borderRadius:20, padding:"2px 10px" }}>📞 {p.phone}</span>}
              </div>

            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── POINT PROFILE ──────────────────────────────────────────────────────────────
function PointProfile({ pt, setPoints, onBack, totalStock, totalSold, totalInStock, totalUnpaid, totalEarned, thisMonth }) {
  const [tab, setTab]           = useState("keychains");
  const [kcOpen, setKcOpen]     = useState(true);
  const [kcForm, setKcForm]     = useState({ items:[{name:"",qty:"",price:""}] });
  const [payForm, setPayForm]   = useState({ amount:"", note:"" });
  const [payModal, setPayModal] = useState(false);
  const [inventory, setInventory] = useState({});
  const [stocktakeMode, setStocktakeMode] = useState(false);
  const [stocktakeResult, setStocktakeResult] = useState(null);
  const [poForm, setPoForm]     = useState({ name:"", cost:"", price:"" });
  const [invoice, setInvoice]   = useState(null);
  const [printModal, setPrintModal] = useState(null); // {newItems, allItems, date}

  // Normalize pt defensively
  const safePt = { ...pt, keychains: pt.keychains || [], payments: pt.payments || [], pointOrders: pt.pointOrders || [] };
  const update = (fn) => setPoints(prev=>prev.map(p=>p.id===pt.id ? fn({...p, keychains:p.keychains||[], payments:p.payments||[], pointOrders:p.pointOrders||[]}) : p));
  const ptKc    = safePt.keychains;
  const ptPays  = safePt.payments;
  const ptOrders = safePt.pointOrders;

  const addKeychain = () => {
    const validItems = kcForm.items.filter(i=>i.name&&i.qty&&i.price);
    if(validItems.length===0) return;
    const isBuyout = safePt.type === "buyout";
    const newItems = validItems.map(i=>({name:i.name, qty:+i.qty, price:+i.price}));
    const totalAmount = newItems.reduce((s,i)=>s+i.qty*i.price, 0);
    update(p => {
      const addedKc = newItems.map(i=>({id:uid(), name:i.name, qty:i.qty, price:i.price, sold:isBuyout?i.qty:0, paid:false}));
      const newKc = [...(p.keychains||[]), ...addedKc];
      const newPays = isBuyout
        ? [...(p.payments||[]), {id:uid(), amount:totalAmount, date:today(), note:`Викуп: ${newItems.map(i=>i.name).join(", ")}`}]
        : (p.payments||[]);
      return {...p, keychains: newKc, payments: newPays};
    });
    setInvoice({ newItems, date:today(), isBuyout });
    setKcForm({ items:[{name:"",qty:"",price:""}] });
  };

  const delKeychain = (kid) => update(p=>({...p, keychains:(p.keychains||[]).filter(k=>k.id!==kid)}));

  const addPayment = () => {
    if(!payForm.amount) return;
    update(p=>({...p, payments:[...(p.payments||[]), {id:uid(), amount:+payForm.amount, date:today(), note:payForm.note}]}));
    setPayForm({amount:"",note:""}); setPayModal(false);
  };

  const delPayment = (pid) => update(p=>({...p, payments:(p.payments||[]).filter(pay=>pay.id!==pid)}));

  // STOCKTAKE: user enters how many remain, we calc sold diff
  const calcStocktake = () => {
    const results = ptKc.map(k => {
      const remaining = inventory[k.id] !== undefined ? +inventory[k.id] : (k.qty - k.sold);
      const prevRemaining = k.qty - k.sold;
      const newlySold = prevRemaining - remaining;
      return { ...k, remaining, newlySold, newTotal: k.sold + newlySold, amount: newlySold * k.price };
    }).filter(r => r.newlySold > 0);
    const totalAmount = results.reduce((s,r)=>s+r.amount,0);
    setStocktakeResult({ items: results, totalAmount });
  };

  const confirmStocktake = () => {
    const r = stocktakeResult;
    // update sold counts
    update(p => ({
      ...p,
      keychains: (p.keychains||[]).map(k => {
        const found = r.items.find(i=>i.id===k.id);
        return found ? {...k, sold: found.newTotal} : k;
      }),
      payments: r.totalAmount > 0
        ? [...(p.payments||[]), {id:uid(), amount:r.totalAmount, date:today(), note:`Переоблік ${today()}`}]
        : p.payments
    }));
    setStocktakeMode(false);
    setStocktakeResult(null);
    setInventory({});
  };

  const unpaid    = totalUnpaid(safePt);
  const earned    = totalEarned(safePt);
  const month     = thisMonth(safePt);
  const inStock   = totalInStock(safePt);
  const remaining = ptKc.reduce((s,k)=>s+(k.qty-k.sold),0);

  return (
    <div>
      <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:20, flexWrap:"wrap" }}>
        <button onClick={onBack} style={{ ...btnSecondary, padding:"7px 14px", fontSize:13 }}>← Назад</button>
        <div style={{ flex:1 }}>
          <div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
            <h2 style={{ ...h2, margin:0 }}>📍 {safePt.name}</h2>
            <span style={{ fontSize:12, fontWeight:600, borderRadius:20, padding:"3px 10px", background:safePt.type==="buyout"?"#f0fff4":"#fff5f7", color:safePt.type==="buyout"?"#27ae60":"#e94560" }}>{safePt.type==="buyout"?"💰 Викуп":"🔄 Реалізація"}</span>
          </div>
          {safePt.address && <div style={{ fontSize:13, color:"#888", marginTop:2 }}>{safePt.address}</div>}
        </div>
        <button onClick={()=>{
          const nowDate = new Date().toISOString().slice(0,10);
          setPrintModal({ type:"general", date:nowDate });
        }} style={{ ...btnSecondary, fontSize:13, padding:"7px 14px", whiteSpace:"nowrap" }}>
          🖨 Загальна накладна
        </button>
      </div>

      <div style={{ display:"flex", gap:8, marginBottom:20, flexWrap:"wrap" }}>
        {pt.instagram && !["—","-",""].includes((pt.instagram||"").trim()) && <a href={`https://instagram.com/${pt.instagram.replace("@","")}`} target="_blank" rel="noreferrer"
          style={{ fontSize:13, background:"#f5f0ff", color:"#9B59B6", borderRadius:20, padding:"5px 14px", textDecoration:"none", fontWeight:600 }}>📸 {pt.instagram}</a>}
        {pt.telegram  && !["—","-",""].includes((pt.telegram||"").trim())  && <a href={`https://t.me/${pt.telegram.replace("@","")}`} target="_blank" rel="noreferrer"
          style={{ fontSize:13, background:"#e8f4fd", color:"#1a6fa8", borderRadius:20, padding:"5px 14px", textDecoration:"none", fontWeight:600 }}>✈️ {pt.telegram}</a>}
        {pt.phone     && !["—","-",""].includes((pt.phone||"").trim())     && <a href={`tel:${pt.phone}`}
          style={{ fontSize:13, background:"#f0fff4", color:"#27ae60", borderRadius:20, padding:"5px 14px", textDecoration:"none", fontWeight:600 }}>📞 {pt.phone}</a>}
      </div>

      {tab==="keychains" && (
        <div>

                    <span style={{ color:"#888" }}>продано ще <strong style={{color:"#e94560"}}>{r.newlySold} шт</strong></span>

              {ptKc.map(k => {
                const prevRemaining = k.qty - k.sold;
                const inputVal = inventory[k.id] !== undefined ? inventory[k.id] : "";
                const newlySold = inputVal !== "" ? prevRemaining - +inputVal : null;
                return (
                  <div key={k.id} style={{ display:"flex", alignItems:"center", gap:12, marginBottom:12, background:"#fff", borderRadius:10, padding:"12px 14px", flexWrap:"wrap" }}>
                    <div style={{ flex:1, minWidth:120 }}>
                      <div style={{ fontWeight:600 }}>{k.name}</div>
                      <div style={{ fontSize:12, color:"#888" }}>Було: {prevRemaining} шт · {k.price} грн/шт</div>

                      <label style={{ fontSize:13, color:"#555" }}>Залишилось:</label>

                      <div style={{ fontSize:13, fontWeight:700, color:"#e94560" }}>продано {newlySold} шт → +{newlySold*k.price} грн</div>

                          <th style={{ padding:"6px 10px", textAlign:"center" }}>Ціна</th>
                          <th style={{ padding:"6px 10px", textAlign:"right" }}>Сума</th>

                          <td style={{ padding:"7px 10px", textAlign:"right", color:"#0f3460" }}>{invoice.newItems.reduce((s,i)=>s+i.qty*i.price,0)} грн</td>

                  </div>
                </div>

                </div>
              </div>
            </div>

        </div>

                    <div style={{ background:"#fdecea", borderRadius:8, padding:"8px 10px" }}>
                      <div style={{ fontSize:10, color:"#888" }}>Собівартість</div>
                      <div style={{ fontWeight:700, color:"#e74c3c" }}>{o.cost} грн</div>
                    </div>
                    <div style={{ background:"#e8f4fd", borderRadius:8, padding:"8px 10px" }}>
                      <div style={{ fontSize:10, color:"#888" }}>Ціна</div>
                      <div style={{ fontWeight:700, color:"#0f3460" }}>{o.price} грн</div>
                    </div>
                    <div style={{ background: profit>=0?"#f0fff4":"#fdecea", borderRadius:8, padding:"8px 10px" }}>
                      <div style={{ fontSize:10, color:"#888" }}>Прибуток</div>
                      <div style={{ fontWeight:700, color: profit>=0?"#27ae60":"#e74c3c" }}>{profit} грн</div>
                    </div>
                  </div>
                  {o.note && <div style={{ fontSize:12, color:"#888", marginTop:8 }}>💬 {o.note}</div>}
                </div>
              );
            })
          }

          {/* Totals */}
          {ptOrders.length > 0 && (
            <div style={{ background:"linear-gradient(135deg,#0f3460,#16213e)", borderRadius:12, padding:"14px 18px", marginBottom:16, display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10, color:"#fff" }}>
              {[
                ["Загальна виручка", ptOrders.reduce((s,o)=>s+(o.price||0),0)+" грн", "#3498DB"],
                ["Собівартість",     ptOrders.reduce((s,o)=>s+(o.cost||0),0)+" грн",  "#E74C3C"],
                ["Прибуток",         ptOrders.reduce((s,o)=>s+(o.price||0)-(o.cost||0),0)+" грн", "#2ECC71"],
              ].map(([l,v,c])=>(
                <div key={l}>
                  <div style={{ fontSize:10, color:"#a0aec0" }}>{l}</div>
                  <div style={{ fontSize:16, fontWeight:800, color:c }}>{v}</div>
                </div>
              ))}
            </div>
          )}

          {/* Add order form */}
          <div style={{ background:"#f7f8fa", borderRadius:12, padding:16, marginTop:8 }}>
            <div style={{ fontWeight:600, fontSize:13, color:"#0f3460", marginBottom:10 }}>+ Нове замовлення</div>
            <div style={{ display:"grid", gridTemplateColumns:"2fr 1fr 1fr", gap:10, marginBottom:10 }}>
              <div>
                <label style={labelStyle}>Назва</label>
                <input value={poForm.name} onChange={e=>setPoForm(f=>({...f,name:e.target.value}))} placeholder="Підставка під телефон"
                  style={{...inputStyle,width:"100%"}}/>
              </div>
              <div>
                <label style={labelStyle}>Собівартість</label>
                <input type="number" value={poForm.cost} onChange={e=>setPoForm(f=>({...f,cost:e.target.value}))} placeholder="80"
                  style={{...inputStyle,width:"100%"}}/>
              </div>
              <div>
                <label style={labelStyle}>Ціна</label>
                <input type="number" value={poForm.price} onChange={e=>setPoForm(f=>({...f,price:e.target.value}))} placeholder="200"
                  style={{...inputStyle,width:"100%"}}/>
              </div>
            </div>
            {poForm.cost && poForm.price && (
              <div style={{ fontSize:13, color:"#27ae60", fontWeight:600, marginBottom:8 }}>
                Прибуток: {+poForm.price - +poForm.cost} грн
              </div>

            <button onClick={()=>{
              if(!poForm.name||!poForm.price) return;
              update(p=>({...p, pointOrders:[...(p.pointOrders||[]), {id:uid(), name:poForm.name, cost:+poForm.cost||0, price:+poForm.price, date:today(), note:""}]}));
              setPoForm({name:"",cost:"",price:""});
            }} style={btnPrimary}>Додати замовлення</button>
          </div>
        </div>
      )}

      {/* PRINT MODAL */}
      {printModal && (
        <div style={{ position:"fixed", inset:0, background:"#fff", zIndex:2000, display:"flex", flexDirection:"column" }}>

            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"16px 20px", borderBottom:"1px solid #eee", flexWrap:"wrap", gap:8 }}>
              <strong style={{ color:"#0f3460", fontSize:15 }}>📄 {printModal.type==="general"?"Накладна залишків":"Накладна поставки"}</strong>
              <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                <button onClick={()=>showInvoiceOverlay(printModal.type, ptKc, invoice, safePt)} style={btnPrimary}>📄 Відкрити накладну</button>

              </div>
            </div>

                  <div style={{ textAlign:"center", marginBottom:14, borderBottom:"2px solid #0f3460", paddingBottom:10 }}>
                    <div style={{ fontWeight:800, fontSize:17, color:"#0f3460" }}>НАКЛАДНА ЗАЛИШКІВ</div>
                    <div style={{ fontSize:12, color:"#888", marginTop:3 }}>Дата: {printModal.date}</div>
                  </div>
                  <p style={{ marginBottom:12, fontSize:14 }}>
                    <strong>Заклад:</strong> {safePt.name}{safePt.address ? " · "+safePt.address : ""}

                        <th style={{ padding:"8px 10px", textAlign:"center", border:"1px solid #ddd" }}>Кількість</th>
                        <th style={{ padding:"8px 10px", textAlign:"center", border:"1px solid #ddd" }}>Ціна</th>
                        <th style={{ padding:"8px 10px", textAlign:"right", border:"1px solid #ddd" }}>Сума</th>
