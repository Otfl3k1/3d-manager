                          <td style={{ padding:"7px 10px", border:"1px solid #ddd", textAlign:"center" }}>{k.price} грн</td>
                          <td style={{ padding:"7px 10px", border:"1px solid #ddd", textAlign:"right", fontWeight:700 }}>{(k.qty-k.sold)*k.price} грн</td>
                        </tr>
                      ))}
                      <tr style={{ background:"#e8f8f0", fontWeight:700 }}>
                        <td style={{ padding:"8px 10px", border:"1px solid #ddd" }}>РАЗОМ</td>
                        <td style={{ padding:"8px 10px", border:"1px solid #ddd", textAlign:"center" }}>{ptKc.reduce((s,k)=>s+(k.qty-k.sold),0)} шт</td>
                        <td style={{ padding:"8px 10px", border:"1px solid #ddd" }}></td>
                        <td style={{ padding:"8px 10px", border:"1px solid #ddd", textAlign:"right", color:"#27ae60" }}>{ptKc.reduce((s,k)=>s+(k.qty-k.sold)*k.price,0)} грн</td>
                      </tr>
                    </tbody>
                  </table>
                  <div style={{ display:"flex", justifyContent:"space-between", marginTop:30, paddingTop:14, borderTop:"1px dashed #ccc", fontSize:13, color:"#555" }}>
                    <div>Підтверджую: _______________</div>
                    <div>Дата: _______________</div>
                  </div>
                </div>
              ) : invoice ? (
                <div>
                  <div style={{ textAlign:"center", marginBottom:14, borderBottom:"2px solid #0f3460", paddingBottom:10 }}>
                    <div style={{ fontWeight:800, fontSize:17, color:"#0f3460" }}>НАКЛАДНА НА ПОСТАЧАННЯ</div>
                    <div style={{ fontSize:12, color:"#888", marginTop:3 }}>Дата: {invoice.date}</div>
                  </div>
                  <p style={{ marginBottom:12, fontSize:14 }}>
                    <strong>Заклад:</strong> {safePt.name}{safePt.address ? " · "+safePt.address : ""}
                    &nbsp;&nbsp;<strong>Тип:</strong> {invoice.isBuyout?"💰 Викуп":"🔄 Реалізація"}
                  </p>
                  <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13, marginBottom:16 }}>
                    <thead>
                      <tr style={{ background:"#e8f4fd" }}>
                        <th style={{ padding:"7px 10px", textAlign:"left", border:"1px solid #ddd" }}>Назва</th>
                        <th style={{ padding:"7px 10px", textAlign:"center", border:"1px solid #ddd" }}>Кількість</th>
                        <th style={{ padding:"7px 10px", textAlign:"center", border:"1px solid #ddd" }}>Ціна</th>
                        <th style={{ padding:"7px 10px", textAlign:"right", border:"1px solid #ddd" }}>Сума</th>
                      </tr>
                    </thead>
                    <tbody>
                      {invoice.newItems.map((item,i)=>(
                        <tr key={i} style={{ background:i%2===0?"#fff":"#fafafa" }}>
                          <td style={{ padding:"7px 10px", border:"1px solid #ddd" }}>{item.name}</td>
                          <td style={{ padding:"7px 10px", border:"1px solid #ddd", textAlign:"center" }}>{item.qty} шт</td>
                          <td style={{ padding:"7px 10px", border:"1px solid #ddd", textAlign:"center" }}>{item.price} грн</td>
                          <td style={{ padding:"7px 10px", border:"1px solid #ddd", textAlign:"right", fontWeight:700 }}>{item.qty*item.price} грн</td>
                        </tr>
                      ))}
                      <tr style={{ background:"#e8f4fd", fontWeight:700 }}>
                        <td style={{ padding:"8px 10px", border:"1px solid #ddd" }}>РАЗОМ</td>
                        <td style={{ padding:"8px 10px", border:"1px solid #ddd", textAlign:"center" }}>{invoice.newItems.reduce((s,i)=>s+i.qty,0)} шт</td>
                        <td style={{ border:"1px solid #ddd" }}></td>
                        <td style={{ padding:"8px 10px", border:"1px solid #ddd", textAlign:"right", color:"#0f3460" }}>{invoice.newItems.reduce((s,i)=>s+i.qty*i.price,0)} грн</td>
                      </tr>
                    </tbody>
                  </table>
                  <div style={{ display:"flex", justifyContent:"space-between", marginTop:24, paddingTop:14, borderTop:"1px dashed #ccc", fontSize:13, color:"#555" }}>
                    <div>Здав: _______________</div>
                    <div>Прийняв: _______________</div>
                  </div>
                </div>
              ) : null}
            </div>
          </div>
        </div>
      )}

      {/* PAYMENTS */}
      {tab==="payments" && (
        <div>
          {unpaid > 0 && (
            <div style={{ background:"#fff8e6", borderRadius:12, padding:"14px 18px", marginBottom:16, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div>
                <div style={{ fontSize:13, color:"#856404" }}>Очікується виплата</div>
                <div style={{ fontSize:22, fontWeight:800, color:"#e67e22" }}>{unpaid} грн</div>
              </div>
              <button onClick={()=>{ setPayForm({amount:unpaid,note:""}); setPayModal(true); }} style={btnPrimary}>
                ✅ Позначити виплату
              </button>
            </div>
          )}

          {payModal && (
            <div style={modalOverlay}>
              <div style={modalBox}>
                <h3 style={{ margin:"0 0 16px", color:"#0f3460" }}>💰 Нова виплата</h3>
                <Field label="Сума (грн)" type="number" value={payForm.amount} onChange={v=>setPayForm(f=>({...f,amount:v}))}/>
                <Field label="Нотатка"   value={payForm.note}   onChange={v=>setPayForm(f=>({...f,note:v}))} placeholder="напр. готівка"/>
                <div style={{ display:"flex", gap:10, marginTop:14 }}>
                  <button onClick={addPayment} style={btnPrimary}>Зберегти</button>
                  <button onClick={()=>setPayModal(false)} style={btnSecondary}>Скасувати</button>
                </div>
              </div>
            </div>
          )}

          {ptPays.length===0
            ? <div style={{ textAlign:"center", color:"#bbb", padding:"30px 0" }}>Виплат ще не було</div>
            : [...ptPays].reverse().map(pay=>(
              <div key={pay.id} style={{ background:"#fff", borderRadius:12, padding:"12px 16px", marginBottom:8, boxShadow:"0 1px 6px #0001", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <div>
                  <div style={{ fontWeight:700, color:"#27ae60", fontSize:16 }}>+{pay.amount} грн</div>
                  <div style={{ fontSize:12, color:"#888" }}>{pay.date}{pay.note ? ` · ${pay.note}` : ""}</div>
                </div>
                <button onClick={()=>delPayment(pay.id)} style={btnIcon}>🗑</button>
              </div>
            ))
          }
          <div style={{ marginTop:12 }}>
            <button onClick={()=>{ setPayForm({amount:"",note:""}); setPayModal(true); }} style={btnSecondary}>+ Додати виплату вручну</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── SHARED ─────────────────────────────────────────────────────────────────────
function StatusBadge({ s }) {
  const c = STATUS_COLORS[s]||{};
  return <span style={{ background:c.bg, color:c.text, borderRadius:20, padding:"2px 10px", fontSize:12, fontWeight:600 }}>{s}</span>;
}
function Card({ title, children }) {
  return (
    <div style={{ background:"#fff", borderRadius:12, padding:20, boxShadow:"0 2px 8px #0001", marginBottom:0 }}>
      <h3 style={{ margin:"0 0 14px", fontSize:15, color:"#0f3460" }}>{title}</h3>
      {children}
    </div>
  );
}
function Field({ label, value, onChange, type="text", placeholder="", step }) {
  return (
    <div style={{ marginBottom:10 }}>
      <label style={labelStyle}>{label}</label>
      <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} step={step}
        style={{...inputStyle,width:"100%"}}/>
    </div>
  );
}
function Slider({ label, value, min, max, step=1, onChange, unit }) {
  return (
    <div style={{ marginBottom:14 }}>
      <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
        <label style={labelStyle}>{label}</label>
        <strong style={{ color:"#0f3460", fontSize:14 }}>{value} {unit}</strong>
      </div>
      <input type="range" min={min} max={max} step={step} value={value} onChange={e=>onChange(+e.target.value)}
        style={{ width:"100%", accentColor:"#e94560" }}/>
    </div>
  );
}

const h2           = { margin:"0 0 12px", fontSize:22, color:"#0f3460" };
const td           = { padding:"9px 12px", verticalAlign:"top" };
const labelStyle   = { display:"block", fontSize:12, fontWeight:600, color:"#666", marginBottom:4 };
const inputStyle   = { border:"1px solid #e0e0e0", borderRadius:8, padding:"8px 10px", fontSize:14, outline:"none", background:"#fafafa", boxSizing:"border-box" };
const btnPrimary   = { background:"#e94560", color:"#fff", border:"none", borderRadius:8, padding:"9px 18px", cursor:"pointer", fontWeight:600, fontSize:14 };
const btnSecondary = { background:"#f0f0f0", color:"#333", border:"none", borderRadius:8, padding:"9px 18px", cursor:"pointer", fontWeight:600, fontSize:14 };
const btnIcon      = { background:"transparent", border:"none", cursor:"pointer", fontSize:16, padding:"2px 6px", borderRadius:6 };
const qtyBtn       = { background:"#f0f0f0", border:"none", borderRadius:6, width:24, height:24, cursor:"pointer", fontWeight:700, fontSize:14 };
const modalOverlay = { position:"fixed", inset:0, background:"rgba(0,0,0,0.5)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:1000 };
const modalBox     = { background:"#fff", borderRadius:16, padding:28, width:"90%", maxWidth:560, maxHeight:"90vh", overflowY:"auto", boxShadow:"0 8px 40px #0004" };

// ── AI ORDER ───────────────────────────────────────────────────────────────────
function AIOrder({ orders, setOrders, filaments, calcOrder, setTab, setPrefill }) {
  const DEFAULT_TEMPLATE = `Привіт! 🖨

Щоб порахувати вартість і строки, напиши:

1️⃣ Як тебе звати?
2️⃣ Номер телефону (для зв'язку):
3️⃣ Що треба надрукувати? Опиши своїми словами:
4️⃣ Потрібна розробка моделі чи є готовий файл? (є файл / треба зробити з нуля):
5️⃣ Колір пластику (або без різниці):
6️⃣ Скільки штук:
7️⃣ Коли потрібно:
8️⃣ Щось ще важливе — пиши тут:

Відповім швидко 🔥`;

  const [step, setStep]             = useState("template");
  const [clientText, setClientText] = useState("");
  const [loading, setLoading]       = useState(false);
  const [parsed, setParsed]         = useState(null);
  const [error, setError]           = useState("");
  const [copied, setCopied]         = useState(false);
  const [editing, setEditing]       = useState(false);
  const [template, setTemplate]     = useState(DEFAULT_TEMPLATE);

  const copyTemplate = () => {
    navigator.clipboard.writeText(template).then(() => { setCopied(true); setTimeout(()=>setCopied(false), 2000); });
  };

  const parseWithAI = async () => {
    if (!clientText.trim()) return setError("Вставте відповідь клієнта");
    setError(""); setLoading(true);

    const filamentNames = filaments.map(f => f.name).join(", ");

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 1000,
          messages: [{
            role: "user",
            content: `Ти — помічник для 3D-бізнесу. Проаналізуй відповідь клієнта і витягни дані для заказу.

Доступні філаменти: ${filamentNames}

Відповідь клієнта:
${clientText}

Поверни ТІЛЬКИ JSON без пояснень та без markdown:
{
  "client": "Ім'я Прізвище",
  "phone": "номер або порожньо",
  "item": "опис виробу (включи кількість якщо вказана)",
  "filament": "назва філаменту з доступних або перший за замовчуванням",
  "hasModel": true або false,
  "deadline": "термін або порожньо",
  "note": "додаткові побажання або порожньо",
  "confidence": "high/medium/low"
}`
          }]
        })
      });
      const data = await res.json();
      const text = data.content.map(c => c.text || "").join("");
      const clean = text.replace(/```json|```/g, "").trim();
      const obj = JSON.parse(clean);
      setParsed(obj);
      setStep("preview");
    } catch(e) {
      setError("Помилка аналізу. Спробуй ще раз або введи дані вручну.");
    }
    setLoading(false);
  };

  const goToCalc = () => {
    setPrefill({
      client:     parsed.client || "",
      phone:      parsed.phone  || "",
      item:       parsed.item   || "",
      hasModel:   parsed.hasModel || false,
      filament:   parsed.filament || filaments[0]?.name || "",
      deadline:   parsed.deadline || "",
      note:       parsed.note || "",
    });
    setTab("calc");
    reset();
  };

  const reset = () => { setStep("template"); setClientText(""); setParsed(null); setError(""); };

  return (
    <div>
      <h2 style={h2}>🤖 Новий заказ через ШІ</h2>

      {/* Steps indicator */}
      <div style={{ display:"flex", gap:0, marginBottom:28, background:"#fff", borderRadius:12, overflow:"hidden", boxShadow:"0 2px 8px #0001" }}>
        {[
          { key:"template", label:"1. Шаблон",       icon:"📋" },
          { key:"paste",    label:"2. Відповідь",    icon:"📩" },
          { key:"preview",  label:"3. Перевірка",    icon:"✅" },
        ].map((s, i) => {
          const active  = step === s.key || (step==="done" && s.key==="preview");
          const done    = (i===0 && ["paste","preview","done"].includes(step))
                       || (i===1 && ["preview","done"].includes(step));
          return (
            <div key={s.key} style={{ flex:1, padding:"14px 10px", textAlign:"center", background: done?"#e8f8f0": active?"#0f3460":"#fff", borderRight:"1px solid #f0f0f0" }}>
              <div style={{ fontSize:20 }}>{done ? "✅" : s.icon}</div>
              <div style={{ fontSize:12, fontWeight:600, color: done?"#27ae60": active?"#fff":"#888", marginTop:4 }}>{s.label}</div>
            </div>
          );
        })}
      </div>

      {/* STEP 1: Template */}
      {step === "template" && (
        <div>
          <div style={{ background:"#fff", borderRadius:14, padding:24, boxShadow:"0 2px 8px #0001", marginBottom:16 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
              <div style={{ fontSize:14, fontWeight:600, color:"#0f3460" }}>📋 Шаблон для клієнта</div>
              <button onClick={()=>setEditing(e=>!e)} style={{ background:"none", border:"1px solid #e0e0e0", borderRadius:8, padding:"4px 12px", cursor:"pointer", fontSize:12, color:"#555" }}>
                {editing ? "👁 Переглянути" : "✏️ Редагувати"}
              </button>
            </div>
            {editing ? (
              <textarea
                value={template}
                onChange={e=>setTemplate(e.target.value)}
                style={{ width:"100%", minHeight:260, border:"1px solid #9B59B6", borderRadius:10, padding:"12px 14px", fontSize:13, fontFamily:"monospace", lineHeight:1.7, resize:"vertical", outline:"none", background:"#faf5ff", boxSizing:"border-box" }}
              />
            ) : (
              <div style={{ background:"#f7f8fa", borderRadius:10, padding:16, fontFamily:"monospace", fontSize:13, lineHeight:1.7, whiteSpace:"pre-wrap", color:"#333", border:"1px solid #e8e8e8" }}>
                {template}
              </div>
            )}
            {editing && (
              <button onClick={()=>setTemplate(DEFAULT_TEMPLATE)} style={{ background:"none", border:"none", color:"#aaa", fontSize:12, cursor:"pointer", marginTop:6, padding:0 }}>
                ↺ Скинути до стандартного
              </button>
            )}
            <div style={{ display:"flex", gap:10, marginTop:16 }}>
              <button onClick={copyTemplate} style={{ ...btnPrimary, background: copied ? "#27ae60" : "#e94560" }}>
                {copied ? "✅ Скопійовано!" : "📋 Копіювати шаблон"}
              </button>
              <button onClick={() => setStep("paste")} style={btnSecondary}>Далі →</button>
            </div>
          </div>
          <div style={{ background:"#e8f4fd", borderRadius:10, padding:14, fontSize:13, color:"#1a6fa8" }}>
            💡 Скопіюй шаблон і відправ клієнту в Instagram або Telegram. Коли він відповість — повернись сюди і натисни <strong>Далі</strong>.
          </div>
        </div>
      )}

      {/* STEP 2: Paste client reply */}
      {step === "paste" && (
        <div>
          <div style={{ background:"#fff", borderRadius:14, padding:24, boxShadow:"0 2px 8px #0001" }}>
            <div style={{ fontSize:14, fontWeight:600, color:"#0f3460", marginBottom:12 }}>📩 Вставте відповідь клієнта</div>
            <div style={{ fontSize:13, color:"#888", marginBottom:12 }}>
              Скопіюй повідомлення клієнта з Instagram або Telegram і встав сюди — ШІ сам розбере всі дані.
            </div>
            <textarea
              value={clientText}
              onChange={e => setClientText(e.target.value)}
              placeholder={"Наприклад:\n1️⃣ Марина Коваль\n2️⃣ +380671234567\n3️⃣ Підставка під телефон з логотипом компанії\n4️⃣ Так, потрібна розробка моделі\n5️⃣ Чорний\n6️⃣ 2 штуки\n7️⃣ Через тиждень\n8️⃣ Лого надішлю окремо"}
              style={{ width:"100%", minHeight:220, border:"1px solid #e0e0e0", borderRadius:10, padding:"12px 14px", fontSize:14, fontFamily:"inherit", resize:"vertical", outline:"none", background:"#fafafa", boxSizing:"border-box", lineHeight:1.6 }}
            />
            {error && <div style={{ color:"#e74c3c", fontSize:13, marginTop:8 }}>⚠️ {error}</div>}
            <div style={{ display:"flex", gap:10, marginTop:16 }}>
              <button onClick={parseWithAI} disabled={loading} style={{ ...btnPrimary, opacity: loading ? 0.7 : 1, minWidth:180 }}>
                {loading ? "⏳ Аналізую..." : "🤖 Створити заказ"}
              </button>
              <button onClick={() => setStep("template")} style={btnSecondary}>← Назад</button>
            </div>
          </div>
        </div>
      )}

      {/* STEP 3: Preview parsed order */}
      {step === "preview" && parsed && (
        <div>
          <div style={{ background:"#fff", borderRadius:14, padding:24, boxShadow:"0 2px 8px #0001", marginBottom:16 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
              <div style={{ fontSize:14, fontWeight:600, color:"#0f3460" }}>✅ ШІ розпізнав заказ</div>
              <span style={{ background: parsed.confidence==="high"?"#d1f2eb": parsed.confidence==="medium"?"#fff3cd":"#fdecea",
                color: parsed.confidence==="high"?"#0e6655": parsed.confidence==="medium"?"#856404":"#c0392b",
                borderRadius:20, padding:"3px 12px", fontSize:12, fontWeight:600 }}>
                {parsed.confidence==="high"?"✅ Впевнений": parsed.confidence==="medium"?"⚠️ Перевір дані":"❓ Уточни дані"}
              </span>
            </div>

            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:16 }}>
              {[
                ["👤 Клієнт",    parsed.client   || "—"],
                ["📞 Телефон",   parsed.phone    || "—"],
                ["📦 Виріб",     parsed.item     || "—"],
                ["🎞 Філамент",  parsed.filament || "—"],
                ["📐 Модель",    parsed.hasModel ? "✅ Так" : "❌ Ні"],
                ["📅 Термін",    parsed.deadline || "Не вказано"],
                ["💬 Нотатка",   parsed.note     || "—"],
              ].map(([l,v]) => (
                <div key={l} style={{ background:"#f7f8fa", borderRadius:10, padding:"10px 14px" }}>
                  <div style={{ fontSize:11, color:"#888", marginBottom:3 }}>{l}</div>
                  <div style={{ fontSize:14, fontWeight:600, color:"#1a1a2e" }}>{v}</div>
                </div>
              ))}
            </div>

            <div style={{ background:"#fff8e6", borderRadius:10, padding:"10px 14px", fontSize:13, color:"#856404", marginBottom:16 }}>
              ⚠️ Граммы, години друку та ціна будуть порожніми — заповни їх після аналізу моделі.
            </div>

            <div style={{ display:"flex", gap:10 }}>
              <button onClick={goToCalc} style={btnPrimary}>🧮 Далі → Калькулятор</button>
              <button onClick={() => setStep("paste")} style={btnSecondary}>← Редагувати</button>
            </div>
          </div>
        </div>
      )}

      {/* DONE */}
      {step === "done" && (
        <div style={{ textAlign:"center", padding:"40px 20px", background:"#fff", borderRadius:14, boxShadow:"0 2px 8px #0001" }}>
          <div style={{ fontSize:56, marginBottom:16 }}>🎉</div>
          <div style={{ fontSize:20, fontWeight:700, color:"#0f3460", marginBottom:8 }}>Заказ створено!</div>
          <div style={{ color:"#888", marginBottom:24 }}>Перейди в 📦 Заказы, знайди новий заказ і заповни граммы, години та ціну.</div>
          <div style={{ display:"flex", gap:10, justifyContent:"center" }}>
            <button onClick={reset} style={btnPrimary}>🤖 Новий заказ</button>
          </div>
        </div>
      )}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
